    /* ═══════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════ */
    function PricingApp({region, onChangeRegion, scene3d}){
      const cur=region.currency;
      const stocks=STOCKS[region.id]||[];
      const[selStock,setSelStock]=useState(null);
      const[method,setMethod]=useState('standard'); // standard | antithetic
      const[params,setParams]=useState({spot:region.spot,strike:region.spot,rate:region.rate,vol:region.vol,maturity:1.0,n:50000});
      const[res,setRes]=useState(null);
      const[busy,setBusy]=useState(false);

      // Dynamic slider config based on current spot
      const sp=params.spot;
      const sliderStep=sp>5000?50:sp>500?5:sp>50?1:0.5;
      const sliderMax=Math.max(500,Math.round(sp*2/100)*100);
      const sliderMin=Math.max(1,Math.round(sp*0.2));

      const handleStockChange=(ticker)=>{
        if(!ticker){setSelStock(null);return;}
        const stk=stocks.find(s=>s.t===ticker);
        if(!stk) return;
        setSelStock(stk);
        setParams(p=>({...p,spot:stk.p,strike:stk.p,vol:stk.v,rate:region.rate}));
      };

      useEffect(()=>{
        gsap.fromTo('.header',      {y:-44,opacity:0},{y:0,opacity:1,duration:1.0,ease:'power3.out',delay:0.05});
        gsap.fromTo('.control-panel',{x:-55,opacity:0},{x:0,opacity:1,duration:0.9,ease:'power3.out',delay:0.25});
        gsap.fromTo('.result-panel', {x:55, opacity:0},{x:0,opacity:1,duration:0.9,ease:'power3.out',delay:0.4});
        gsap.fromTo('.chart-panel',  {x:55, opacity:0},{x:0,opacity:1,duration:0.9,ease:'power3.out',delay:0.55});
        const t=setTimeout(()=>runSim({spot:region.spot,strike:region.spot,rate:region.rate,vol:region.vol,maturity:1.0,n:50000}),1400);
        return()=>clearTimeout(t);
      },[region]);

      const runSim=useCallback((p)=>{
        setBusy(true);
        setTimeout(()=>{
          const priceFn=method==='antithetic'?mcPriceAntithetic:method==='control'?mcPriceControlVariate:mcPrice;
          const call=priceFn(p.spot,p.strike,p.rate,p.vol,p.maturity,p.n,'call');
          const put =priceFn(p.spot,p.strike,p.rate,p.vol,p.maturity,p.n,'put');
          const bsCall=bsPrice(p.spot,p.strike,p.rate,p.vol,p.maturity,'call');
          const bsPut =bsPrice(p.spot,p.strike,p.rate,p.vol,p.maturity,'put');
          const df=Math.exp(-p.rate*p.maturity),lhs=call.price-put.price,rhs=p.spot-p.strike*df;
          setRes({call,put,lhs,rhs,err:Math.abs(lhs-rhs),bsCall,bsPut,method});
          setBusy(false);
          scene3d?.buildPaths(p.rate,p.vol,p.maturity);
          gsap.fromTo('.opt-card',      {y:10,opacity:0},{y:0,opacity:1,stagger:0.07,duration:0.5,ease:'back.out(1.5)'});
          gsap.fromTo('.parity,.sim-info',{y:8,opacity:0},{y:0,opacity:1,stagger:0.06,duration:0.45,ease:'power2.out',delay:0.15});
          gsap.fromTo('.sug-card',      {y:20,opacity:0},{y:0,opacity:1,stagger:0.07,duration:0.55,ease:'back.out(1.4)',delay:0.2});
        },30);
      },[scene3d,method]);

      const set=(k,v)=>setParams(p=>({...p,[k]:v}));
      const handleRun=()=>{gsap.to('.run-btn',{scale:0.95,duration:0.09,yoyo:true,repeat:1});runSim(params);};
      const confPct=(se,price)=>price?Math.max(6,Math.min(94,(1-Math.min(se/price*25,1))*100)):50;

      return(
        <>
          <header className="header">
            <div className="badge" style={{color:region.color,borderColor:region.color+'44',background:region.color+'10'}}>
              <span className="badge-dot" style={{background:region.color,boxShadow:`0 0 7px ${region.color}`}}/>
              QUANTITATIVE FINANCE
            </div>
            <h1>MONTE CARLO ENGINE</h1>
            <p className="subtitle">Options Pricing via Geometric Brownian Motion</p>
            <div className="header-tags">
              <span>{region.flag} {region.name}</span><span className="tag-sep">·</span>
              {selStock?<><span style={{color:region.color,fontWeight:600}}>{selStock.t}</span><span className="tag-sep">·</span><span>{cur}{selStock.p.toLocaleString()}</span><span className="tag-sep">·</span></>
              :<><span>{region.index}</span><span className="tag-sep">·</span></>}
              <span>{region.currencyName} ({cur})</span><span className="tag-sep">·</span>
              <span>{method==='antithetic'?'Antithetic MC':method==='control'?'Control Variate MC':'Standard MC'}</span>
            </div>
            <div style={{display:'flex',justifyContent:'center'}}>
              <div className="region-pill" style={{'--rc-color':region.color}} onClick={onChangeRegion}>
                <span className="region-pill-flag">{region.flag}</span>
                {region.name} — CHANGE REGION ↗
              </div>
            </div>
          </header>

          <div className="panels">
            {/* Controls */}
            <div className="glass control-panel">
              <div className="card-head">
                <span className="card-tag">Market Parameters</span>
                <div className="sdot"/>
              </div>

              {/* Stock Selector */}
              <div className="stock-picker">
                <select className="stock-select" value={selStock?.t||''} onChange={e=>handleStockChange(e.target.value)}>
                  <option value="">-- Custom Mode --</option>
                  {stocks.map(s=><option key={s.t} value={s.t}>{s.t} — {cur}{s.p.toLocaleString()} ({s.s})</option>)}
                </select>
                {selStock&&(
                  <div className="stock-info">
                    <span className="stock-ticker">{selStock.t}</span>
                    <span className="stock-name">{selStock.n}</span>
                    <span className="stock-tag">{selStock.s}</span>
                    <span className="stock-tag">Vol {(selStock.v*100).toFixed(0)}%</span>
                  </div>
                )}
              </div>

              <div className="slider-list">
                <Slider label="Spot Price"       value={params.spot}     min={sliderMin} max={sliderMax} step={sliderStep} fmt={v=>`${cur}${v.toLocaleString()}`} onChange={v=>set('spot',v)}/>
                <Slider label="Strike Price"     value={params.strike}   min={sliderMin} max={sliderMax} step={sliderStep} fmt={v=>`${cur}${v.toLocaleString()}`} onChange={v=>set('strike',v)}/>
                <Slider label="Risk-free Rate"   value={params.rate}     min={0}     max={0.20}   step={0.001} fmt={v=>`${(v*100).toFixed(1)}%`} onChange={v=>set('rate',v)}/>
                <Slider label="Volatility σ"     value={params.vol}      min={0.05}  max={0.85}   step={0.01}  fmt={v=>`${(v*100).toFixed(0)}%`} onChange={v=>set('vol',v)}/>
                <Slider label="Time to Maturity" value={params.maturity} min={0.1}   max={3.0}    step={0.1}   fmt={v=>`${v.toFixed(1)} yr`}      onChange={v=>set('maturity',v)}/>
                <Slider label="Simulations"      value={params.n}        min={1000}  max={100000} step={1000}  fmt={v=>`${(v/1000).toFixed(0)}K`} onChange={v=>set('n',v)}/>
              </div>

              {/* Method Toggle */}
              <div className="method-row">
                <button className={`method-btn${method==='standard'?' active':''}`} onClick={()=>setMethod('standard')}>STANDARD</button>
                <button className={`method-btn${method==='antithetic'?' active':''}`} onClick={()=>setMethod('antithetic')}>ANTITHETIC</button>
                <button className={`method-btn${method==='control'?' active':''}`} onClick={()=>setMethod('control')}>CONTROL VAR</button>
              </div>

              <button className="run-btn" onClick={handleRun} disabled={busy}>
                {busy?<><span className="spin"/>COMPUTING…</>:<>▶ &nbsp;RUN SIMULATION</>}
              </button>
            </div>

            {/* Results */}
            <div className="glass result-panel">
              <div className="card-head"><span className="card-tag">Results</span><div className={`sdot ${res?'live':''}`}/></div>
              {res?(
                <>
                  <div className="opt-grid">
                    <div className="opt-card">
                      <div className="opt-type">CALL OPTION</div>
                      <div className="opt-price call"><AnimNum value={res.call.price} dec={4} pre={cur}/></div>
                      <div className="opt-se">σ̂ = <AnimNum value={res.call.se} dec={5} pre={cur}/></div>
                      <div className="opt-ci">95% CI: [<AnimNum value={res.call.ci[0]} dec={3} pre={cur}/>,&nbsp;<AnimNum value={res.call.ci[1]} dec={3} pre={cur}/>]</div>
                      <div className="opt-bar"><div className="opt-bar-fill call" style={{width:`${confPct(res.call.se,res.call.price)}%`}}/></div>
                    </div>
                    <div className="opt-card">
                      <div className="opt-type">PUT OPTION</div>
                      <div className="opt-price put"><AnimNum value={res.put.price} dec={4} pre={cur}/></div>
                      <div className="opt-se">σ̂ = <AnimNum value={res.put.se} dec={5} pre={cur}/></div>
                      <div className="opt-ci">95% CI: [<AnimNum value={res.put.ci[0]} dec={3} pre={cur}/>,&nbsp;<AnimNum value={res.put.ci[1]} dec={3} pre={cur}/>]</div>
                      <div className="opt-bar"><div className="opt-bar-fill put" style={{width:`${confPct(res.put.se,res.put.price)}%`}}/></div>
                    </div>
                  </div>
                  <div className="parity">
                    <div className="parity-title">PUT-CALL PARITY CHECK</div>
                    <div className="p-row"><span className="p-key">C − P</span><span className="p-val"><AnimNum value={res.lhs} dec={4} pre={cur}/></span></div>
                    <div className="p-row"><span className="p-key">S − K · e⁻ʳᵀ</span><span className="p-val"><AnimNum value={res.rhs} dec={4} pre={cur}/></span></div>
                    <div className="p-row err"><span className="p-key">Δ error</span><span className={`p-val ${res.err<0.15?'ok':'warn'}`}><AnimNum value={res.err} dec={6} pre={cur}/></span></div>
                  </div>
                  {/* BS Analytical Comparison */}
                  <div className="parity">
                    <div className="parity-title">BLACK-SCHOLES VALIDATION</div>
                    <div className="bs-row">
                      <span className="bs-label">BS Call</span>
                      <span className="bs-val" style={{color:'#00ff88'}}><AnimNum value={res.bsCall} dec={4} pre={cur}/></span>
                    </div>
                    <div className="bs-row">
                      <span className="bs-label">BS Put</span>
                      <span className="bs-val" style={{color:'#f97316'}}><AnimNum value={res.bsPut} dec={4} pre={cur}/></span>
                    </div>
                    <div className="bs-row" style={{borderTop:'1px solid rgba(255,255,255,0.07)',marginTop:'0.2rem',paddingTop:'0.3rem'}}>
                      <span className="bs-label">MC vs BS Diff</span>
                      <span className="bs-val" style={{color:Math.abs(res.call.price-res.bsCall)<0.15?'#00ff88':'#f97316'}}>
                        <AnimNum value={Math.abs(res.call.price-res.bsCall)} dec={5} pre={cur}/>
                      </span>
                    </div>
                  </div>

                  <div className="sim-info">
                    <span>{res.method==='antithetic'?'Antithetic MC':'Standard MC'}:</span>
                    <span className="sim-n">{params.n.toLocaleString()} paths</span>
                  </div>
                </>
              ):<div className="empty"><div className="dots"><span/><span/><span/></div></div>}
            </div>

            <ChartPanel params={params} res={res} currency={cur}/>
          </div>

          {res&&(
            <>
              <div className="section-label">── ANALYSIS &amp; SUGGESTIONS ──</div>
              <SuggestionsPanel params={params} res={res} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── EXOTIC OPTIONS ──</div>
              <ExoticPanel params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── RISK METRICS ──</div>
              <RiskPanel params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── OPTION CHAIN ──</div>
              <OptionChain params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── CONVERGENCE ANALYSIS ──</div>
              <ConvergencePanel params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── GREEKS SENSITIVITY ──</div>
              <GreeksSurface params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── STRATEGY BUILDER ──</div>
              <StrategyBuilder params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── VARIANCE REDUCTION COMPARISON ──</div>
              <VarReductionPanel params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── STRESS TESTING ──</div>
              <StressTestPanel params={params} currency={cur}/>
              <div className="section-label" style={{marginTop:'1.5rem'}}>── P&L SCENARIO MATRIX ──</div>
              <PnlMatrix params={params} currency={cur}/>
            </>
          )}
        </>
      );
    }

    /* ═══════════════════════════════════════════════════
       ROOT
    ═══════════════════════════════════════════════════ */
    function Root(){
      const[region,setRegion]=useState(null);
      const scene3dRef=useRef(null);

      // Boot Three.js once
      useEffect(()=>{
        scene3dRef.current=new Scene3D(document.getElementById('bg'));
        // Animate selector in
        gsap.fromTo('#selector-screen',{opacity:0,y:30},{opacity:1,y:0,duration:0.9,ease:'power3.out',delay:0.2});
        return()=>scene3dRef.current?.destroy();
      },[]);

      const handleSelect=(r)=>{
        // Update CSS accent
        document.documentElement.style.setProperty('--accent',r.color);
        // Animate selector out
        gsap.to('#selector-screen',{opacity:0,y:-40,duration:0.5,ease:'power2.in',onComplete:()=>{
          document.getElementById('selector-screen').style.display='none';
          setRegion(r);
          gsap.to('#app-screen',{opacity:1,y:0,duration:0.65,ease:'power3.out'});
        }});
      };

      const handleChangeRegion=()=>{
        // Animate app out
        gsap.to('#app-screen',{opacity:0,y:20,duration:0.4,ease:'power2.in',onComplete:()=>{
          setRegion(null);
          document.getElementById('selector-screen').style.display='flex';
          document.getElementById('selector-screen').style.opacity='0';
          document.documentElement.style.setProperty('--accent','#00ff88');
          gsap.to('#selector-screen',{opacity:1,y:0,duration:0.55,ease:'power3.out'});
        }});
      };

      return(
        <>
          <div id="_selector">
            {!region&&<RegionSelector onSelect={handleSelect}/>}
          </div>
          {region&&<PricingApp region={region} onChangeRegion={handleChangeRegion} scene3d={scene3dRef.current}/>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('selector-screen')).render(<RegionSelector onSelect={r=>{
      document.documentElement.style.setProperty('--accent',r.color);
      gsap.to('#selector-screen',{opacity:0,y:-40,duration:0.5,ease:'power2.in',onComplete:()=>{
        document.getElementById('selector-screen').style.display='none';
        ReactDOM.createRoot(document.getElementById('app-screen')).render(
          <PricingApp region={r} onChangeRegion={()=>{
            gsap.to('#app-screen',{opacity:0,y:20,duration:0.4,ease:'power2.in',onComplete:()=>{
              document.getElementById('app-screen').innerHTML='';
              document.documentElement.style.setProperty('--accent','#00ff88');
              const sel=document.getElementById('selector-screen');
              sel.style.display='flex'; sel.style.opacity='0';
              ReactDOM.createRoot(sel).render(<RegionSelector onSelect={r2=>{
                document.documentElement.style.setProperty('--accent',r2.color);
                gsap.to('#selector-screen',{opacity:0,y:-40,duration:0.5,ease:'power2.in',onComplete:()=>{
                  sel.style.display='none';
                  ReactDOM.createRoot(document.getElementById('app-screen')).render(
                    <PricingApp region={r2} onChangeRegion={()=>location.reload()} scene3d={window._scene3d}/>
                  );
                  gsap.to('#app-screen',{opacity:1,y:0,duration:0.65,ease:'power3.out'});
                }});
              }}/>);
              gsap.to('#selector-screen',{opacity:1,y:0,duration:0.55,ease:'power3.out'});
            }});
          }} scene3d={window._scene3d}/>
        );
        gsap.to('#app-screen',{opacity:1,y:0,duration:0.65,ease:'power3.out'});
      }});
    }}/>);

    // Boot scene
    window._scene3d = new Scene3D(document.getElementById('bg'));
    gsap.fromTo('#selector-screen',{opacity:0,y:30},{opacity:1,y:0,duration:0.9,ease:'power3.out',delay:0.3});
  </script>
</body>
</html>
