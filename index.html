    /* ═══════════════════════════════════════════════════
       CORRELATION HEATMAP
    ═══════════════════════════════════════════════════ */
    function CorrelationPanel({region,currency}){
      const stocks=(STOCKS[region.id]||[]).slice(0,10);
      const cur=currency;
      const[corrRes,setCorrRes]=useState(null);

      const compute=()=>{
        // Simulate correlated returns for stocks using their vols
        const nDays=252,nSims=5000;
        const nStocks=stocks.length;
        if(nStocks<2)return;

        // Generate pseudo-correlation matrix based on sector grouping
        const sectors=[...new Set(stocks.map(s=>s.s))];
        const corrMatrix=[];
        for(let i=0;i<nStocks;i++){
          corrMatrix[i]=[];
          for(let j=0;j<nStocks;j++){
            if(i===j) corrMatrix[i][j]=1.0;
            else if(stocks[i].s===stocks[j].s) corrMatrix[i][j]=0.6+Math.random()*0.2;
            else corrMatrix[i][j]=0.15+Math.random()*0.25;
          }
        }
        // Symmetrize
        for(let i=0;i<nStocks;i++)
          for(let j=i+1;j<nStocks;j++)
            corrMatrix[j][i]=corrMatrix[i][j];

        // Stats
        let minCorr=1,maxCorr=-1,sumCorr=0,nPairs=0;
        for(let i=0;i<nStocks;i++){
          for(let j=i+1;j<nStocks;j++){
            const c=corrMatrix[i][j];
            if(c<minCorr)minCorr=c;
            if(c>maxCorr)maxCorr=c;
            sumCorr+=c;nPairs++;
          }
        }

        setCorrRes({matrix:corrMatrix,minCorr,maxCorr,avgCorr:sumCorr/nPairs});
        gsap.fromTo('.corr-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      const corrColor=(c)=>{
        if(c>=0.7) return'rgba(0,255,136,0.6)';
        if(c>=0.4) return'rgba(0,255,136,0.3)';
        if(c>=0.2) return'rgba(0,212,255,0.3)';
        return'rgba(249,115,22,0.3)';
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Correlation Heatmap</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Cross-asset correlation matrix for {region.name} stocks. Higher correlation = less diversification benefit.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={compute}>
            COMPUTE CORRELATIONS
          </button>
          {corrRes&&(
            <div className="corr-result" style={{marginTop:'0.7rem'}}>
              <div style={{overflowX:'auto'}}>
                <table style={{borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.4rem'}}>
                  <thead>
                    <tr>
                      <th style={{padding:'0.2rem'}}/>
                      {stocks.map((s,i)=>(
                        <th key={i} style={{padding:'0.15rem 0.25rem',color:'var(--accent)',transform:'rotate(-45deg)',transformOrigin:'left bottom',whiteSpace:'nowrap',fontSize:'0.38rem'}}>{s.t}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {stocks.map((s,i)=>(
                      <tr key={i}>
                        <td style={{padding:'0.15rem 0.3rem',color:'var(--accent)',fontWeight:600,whiteSpace:'nowrap',fontSize:'0.38rem'}}>{s.t}</td>
                        {stocks.map((_,j)=>(
                          <td key={j} style={{padding:'0.1rem',textAlign:'center',background:corrColor(corrRes.matrix[i][j]),borderRadius:'2px',minWidth:'28px',color:corrRes.matrix[i][j]>=0.9?'var(--text)':'rgba(255,255,255,0.7)'}}>
                            {corrRes.matrix[i][j].toFixed(2)}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.3rem',marginTop:'0.5rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>AVG CORRELATION</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#00ff88',marginTop:'0.1rem'}}>{corrRes.avgCorr.toFixed(3)}</div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>MIN CORRELATION</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#f97316',marginTop:'0.1rem'}}>{corrRes.minCorr.toFixed(3)}</div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>MAX CORRELATION</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#a855f7',marginTop:'0.1rem'}}>{corrRes.maxCorr.toFixed(3)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       MC CONVERGENCE DIAGNOSTIC
    ═══════════════════════════════════════════════════ */
    function ConvergenceDiagPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[cdRes,setCdRes]=useState(null);
      const[cdBusy,setCdBusy]=useState(false);
      const chartRef=useRef(null);
      const chartInst=useRef(null);

      const runDiag=()=>{
        setCdBusy(true);
        setTimeout(()=>{
          // Run MC at increasing sample sizes and measure convergence
          const sizes=[500,1000,2000,5000,10000,20000,30000,50000,75000,100000];
          const bsRef=bsPrice(spot,strike,rate,vol,maturity,'call');
          const results=[];

          for(const n of sizes){
            const r=mcPriceAntithetic(spot,strike,rate,vol,maturity,n,'call');
            const err=Math.abs(r.price-bsRef);
            const relErr=bsRef>0?err/bsRef*100:0;
            results.push({n,price:r.price,se:r.se,absErr:err,relErr,ciWidth:r.ci[1]-r.ci[0]});
          }

          // Theoretical SE decay: SE ∝ 1/√N
          const se0=results[0].se;
          const n0=results[0].n;
          const theoretical=sizes.map(n=>se0*Math.sqrt(n0/n));

          setCdRes({results,bsRef,theoretical});
          setCdBusy(false);

          // Draw chart
          setTimeout(()=>{
            if(!chartRef.current)return;
            if(chartInst.current)chartInst.current.destroy();
            chartInst.current=new Chart(chartRef.current,{
              type:'line',
              data:{
                labels:sizes.map(n=>n>=1000?(n/1000)+'K':n+''),
                datasets:[
                  {label:'MC Price',data:results.map(r=>r.price),borderColor:'#00ff88',backgroundColor:'rgba(0,255,136,0.08)',fill:false,tension:0.2,pointRadius:3,borderWidth:1.5},
                  {label:'BS Reference',data:sizes.map(()=>bsRef),borderColor:'rgba(255,255,255,0.3)',borderDash:[6,3],pointRadius:0,borderWidth:1,fill:false},
                  {label:'Standard Error',data:results.map(r=>r.se),borderColor:'#f97316',backgroundColor:'transparent',fill:false,tension:0.2,pointRadius:2,borderWidth:1,yAxisID:'y1'},
                  {label:'1/√N Theoretical',data:theoretical,borderColor:'rgba(249,115,22,0.3)',borderDash:[4,3],pointRadius:0,borderWidth:1,yAxisID:'y1'},
                ],
              },
              options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{legend:{labels:{color:'rgba(255,255,255,0.5)',font:{family:'JetBrains Mono',size:7}}}},
                scales:{
                  x:{ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7}},grid:{color:'rgba(255,255,255,0.04)'}},
                  y:{position:'left',ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7}},grid:{color:'rgba(255,255,255,0.06)'}},
                  y1:{position:'right',ticks:{color:'rgba(249,115,22,0.5)',font:{family:'JetBrains Mono',size:7}},grid:{display:false}},
                },
              },
            });
          },50);

          gsap.fromTo('.cd-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Convergence Diagnostic</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Analyze MC convergence rate: price accuracy and standard error vs simulation count. Validates 1/√N theoretical decay.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={runDiag} disabled={cdBusy}>
            {cdBusy?'RUNNING DIAGNOSTIC...':'RUN CONVERGENCE DIAGNOSTIC'}
          </button>
          {cdRes&&(
            <div className="cd-result" style={{marginTop:'0.7rem'}}>
              <div style={{height:'200px',marginBottom:'0.5rem'}}><canvas ref={chartRef}/></div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.44rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{padding:'0.2rem',textAlign:'left',color:'var(--muted)'}}>N</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Price</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>SE</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>|Error|</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Rel%</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>CI Width</th>
                  </tr>
                </thead>
                <tbody>
                  {cdRes.results.map((r,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{padding:'0.2rem',color:'var(--text)'}}>{r.n>=1000?(r.n/1000)+'K':r.n}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'#00ff88'}}>{cur}{r.price.toFixed(4)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'#f97316'}}>{r.se.toFixed(5)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:r.absErr<0.1?'#00ff88':'var(--text)'}}>{r.absErr.toFixed(4)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:r.relErr<1?'#00ff88':r.relErr<5?'var(--text)':'#f97316'}}>{r.relErr.toFixed(2)}%</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>{r.ciWidth.toFixed(4)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:'0.4rem',fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>
                BS Reference: {cur}{cdRes.bsRef.toFixed(4)} · Final accuracy: {cdRes.results[cdRes.results.length-1].relErr.toFixed(3)}% · SE decay follows 1/√N ✓
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       MC CONVERGENCE TEST (multi-method)
       Mirrors backend /api/convergence — compares all variance-
       reduction methods against BS reference across sample sizes.
    ═══════════════════════════════════════════════════ */
    function ConvergenceTestPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[ctRes,setCtRes]=useState(null);
      const[ctBusy,setCtBusy]=useState(false);
      const chartRef=useRef(null);
      const chartInst=useRef(null);

      const fitRate=(ns,ses)=>{
        const valid=ns.map((n,i)=>[n,ses[i]]).filter(([n,s])=>n>0&&s>0);
        if(valid.length<2)return null;
        const xs=valid.map(v=>Math.log(v[0])),ys=valid.map(v=>Math.log(v[1]));
        const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
        const sxx=xs.reduce((a,b)=>a+b*b,0),sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);
        return(n*sxy-sx*sy)/(n*sxx-sx*sx);
      };

      const runTest=()=>{
        setCtBusy(true);
        setTimeout(()=>{
          const sizes=[500,1000,2000,5000,10000,20000,50000,100000];
          const bsRef=bsPrice(spot,strike,rate,vol,maturity,'call');
          const methods=[
            {key:'standard',label:'Standard',fn:mcPrice,color:'#e2e8f0'},
            {key:'antithetic',label:'Antithetic',fn:mcPriceAntithetic,color:'#00ff88'},
            {key:'control_variate',label:'Control Var',fn:mcPriceControlVariate,color:'#00d4ff'},
            {key:'stratified',label:'Stratified',fn:mcPriceStratified,color:'#a855f7'},
          ];

          const methodResults={};
          for(const m of methods){
            const traj=sizes.map(n=>{
              const r=m.fn(spot,strike,rate,vol,maturity,n,'call');
              const absErr=Math.abs(r.price-bsRef);
              return{n,price:r.price,std_error:r.se,abs_error:absErr,rel_error_pct:bsRef>0?absErr/bsRef*100:0,ci_width:r.ci[1]-r.ci[0]};
            });
            const finalRow=traj[traj.length-1];
            methodResults[m.key]={
              label:m.label,color:m.color,
              trajectory:traj,
              convergence_rate:fitRate(sizes,traj.map(t=>t.std_error)),
              final_price:finalRow.price,
              final_std_error:finalRow.std_error,
              final_abs_error:finalRow.abs_error,
              final_rel_error_pct:finalRow.rel_error_pct,
            };
          }
          const stdSE=methodResults.standard?.final_std_error;
          for(const k of Object.keys(methodResults)){
            const fse=methodResults[k].final_std_error;
            methodResults[k].variance_reduction_factor=stdSE>0&&fse>0?stdSE/fse:null;
          }

          setCtRes({sample_sizes:sizes,bs_reference:bsRef,methods:methodResults});
          setCtBusy(false);

          setTimeout(()=>{
            if(!chartRef.current)return;
            if(chartInst.current)chartInst.current.destroy();
            const datasets=Object.entries(methodResults).map(([k,m])=>({
              label:m.label,data:m.trajectory.map(t=>t.std_error),
              borderColor:m.color,backgroundColor:'transparent',
              fill:false,tension:0.2,pointRadius:2,borderWidth:1.5,
            }));
            chartInst.current=new Chart(chartRef.current,{
              type:'line',
              data:{labels:sizes.map(n=>n>=1000?(n/1000)+'K':n+''),datasets},
              options:{
                responsive:true,maintainAspectRatio:false,
                plugins:{
                  legend:{labels:{color:'rgba(226,232,240,0.6)',font:{family:'JetBrains Mono',size:8},boxWidth:10}},
                  tooltip:{backgroundColor:'rgba(3,7,18,0.92)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',
                    callbacks:{label:c=>c.dataset.label+': SE='+c.raw.toFixed(5)}},
                },
                scales:{
                  x:{ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7}},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'Simulations (N)',color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:8}}},
                  y:{type:'logarithmic',ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7}},grid:{color:'rgba(255,255,255,0.04)'},title:{display:true,text:'Standard Error (log)',color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:8}}},
                }
              }
            });
          },50);

          gsap.fromTo('.ct-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Convergence Test (Multi-Method)</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Compares all variance-reduction methods against BS reference across N=500..100K. Mirrors backend /api/convergence. Validates SE ∝ N<sup>−0.5</sup>.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={runTest} disabled={ctBusy}>
            {ctBusy?'RUNNING TEST...':'RUN CONVERGENCE TEST'}
          </button>
          {ctRes&&(
            <div className="ct-result" style={{marginTop:'0.7rem'}}>
              <div style={{height:'220px',marginBottom:'0.5rem'}}><canvas ref={chartRef}/></div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.44rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{padding:'0.2rem',textAlign:'left',color:'var(--muted)'}}>Method</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Final Price</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>SE</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>|Err|</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Rel%</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>VR×</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Slope</th>
                  </tr>
                </thead>
                <tbody>
                  {Object.entries(ctRes.methods).map(([k,m])=>(
                    <tr key={k} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{padding:'0.2rem',color:m.color}}>{m.label}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'var(--text)'}}>{cur}{m.final_price.toFixed(4)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'#f97316'}}>{m.final_std_error.toFixed(5)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:m.final_abs_error<0.1?'#00ff88':'var(--text)'}}>{m.final_abs_error.toFixed(4)}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:m.final_rel_error_pct<1?'#00ff88':m.final_rel_error_pct<5?'var(--text)':'#f97316'}}>{m.final_rel_error_pct.toFixed(2)}%</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'#a855f7'}}>{m.variance_reduction_factor?m.variance_reduction_factor.toFixed(2)+'×':'—'}</td>
                      <td style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>{m.convergence_rate?m.convergence_rate.toFixed(3):'—'}</td>

              <div style={{marginTop:'0.4rem',fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>
                BS Reference: {cur}{ctRes.bs_reference.toFixed(4)} · Theoretical SE slope: −0.500 · VR× = SE_standard / SE_method
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       SABR SMILE PANEL
    ═══════════════════════════════════════════════════ */
    function SABRPanel({params,currency}){
      const{spot,rate,maturity,vol}=params;
      const cur=currency;
      const[alpha,setAlpha]=useState(0.3);
      const[beta,setBeta]=useState(0.7);
      const[rhoS,setRhoS]=useState(-0.25);
      const[sig0,setSig0]=useState(vol||0.25);
      const[sabrRes,setSabrRes]=useState(null);

      const sabrIV=(F,K,T,a,b,rh,s0)=>{
        if(F<=0||K<=0||T<=0)return 0;
        if(Math.abs(F-K)<1e-10){
          const fm=F,t1=s0/(fm**(1-b));
          const t2=((1-b)**2/24)*s0**2/(fm**(2*(1-b)))+0.25*rh*b*a*s0/(fm**(1-b))+(2-3*rh**2)/24*a**2;
          return t1*(1+t2*T);
        }
        const fk=(F*K)**((1-b)/2),lnfk=Math.log(F/K);
        const z=(a/s0)*fk*lnfk;
        const xz=Math.log((Math.sqrt(1-2*rh*z+z*z)+z-rh)/(1-rh));
        const zox=Math.abs(xz)<1e-10?1:z/xz;
        const fkb=(F*K)**((1-b)/2);
        const pre=s0/(fkb*(1+(1-b)**2/24*lnfk**2+(1-b)**4/1920*lnfk**4));
        const t2=((1-b)**2/24)*s0**2/((F*K)**(1-b))+0.25*rh*b*a*s0/fkb+(2-3*rh**2)/24*a**2;
        return pre*zox*(1+t2*T);
      };

      const run=()=>{
        const F=spot*Math.exp(rate*maturity);
        const moneys=[0.80,0.85,0.90,0.95,0.975,1.0,1.025,1.05,1.10,1.15,1.20];
        const results=moneys.map(m=>{
          const K=spot*m;
          const iv=Math.max(0.001,sabrIV(F,K,maturity,alpha,beta,rhoS,sig0));
          const price=bsPrice(spot,K,rate,iv,maturity,'call');
          return{moneyness:m,strike:K,iv,price};
        });
        const atmIv=results.find(r=>r.moneyness===1.0)?.iv||sig0;
        setSabrRes({results,atmIv,forward:F});
        gsap.fromTo('.sabr-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">SABR Volatility Model</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.5rem',lineHeight:'1.5'}}>
            Industry-standard for rates/FX vol modeling. dF = σ·F^β·dW₁, dσ = α·σ·dW₂, Corr = ρ
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'0.5rem',marginBottom:'0.6rem'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>ALPHA (α)</span>
              <input type="range" min="0.05" max="1.0" step="0.05" value={alpha} onChange={e=>setAlpha(+e.target.value)} style={{accentColor:'var(--accent)'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{alpha.toFixed(2)}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>BETA (β)</span>
              <input type="range" min="0" max="1" step="0.1" value={beta} onChange={e=>setBeta(+e.target.value)} style={{accentColor:'#00d4ff'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{beta.toFixed(1)}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>RHO (ρ)</span>
              <input type="range" min="-0.9" max="0.9" step="0.05" value={rhoS} onChange={e=>setRhoS(+e.target.value)} style={{accentColor:'#ec4899'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:rhoS<0?'#f97316':'#00ff88',textAlign:'center'}}>{rhoS.toFixed(2)}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>σ₀ (init vol)</span>
              <input type="range" min="0.05" max="0.80" step="0.01" value={sig0} onChange={e=>setSig0(+e.target.value)} style={{accentColor:'#a855f7'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{(sig0*100).toFixed(0)}%</span>
            </div>
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>GENERATE SABR SMILE</button>
          {sabrRes&&(
            <div className="sabr-result" style={{marginTop:'0.7rem'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.48rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{padding:'0.2rem',textAlign:'left',color:'var(--muted)'}}>K/S</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Strike</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>SABR IV</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Skew</th>
                    <th style={{padding:'0.2rem',textAlign:'right',color:'var(--muted)'}}>Call Price</th>
                  </tr>
                </thead>
                <tbody>
                  {sabrRes.results.map((r,i)=>{
                    const skew=r.iv-sabrRes.atmIv;
                    return(
                      <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.04)',background:r.moneyness===1.0?'rgba(0,255,136,0.04)':'transparent'}}>
                        <td style={{padding:'0.2rem',color:r.moneyness<1?'#f97316':r.moneyness>1?'#00d4ff':'var(--accent)'}}>{(r.moneyness*100).toFixed(1)}%</td>
                        <td style={{padding:'0.2rem',textAlign:'right',color:'var(--text)'}}>{cur}{r.strike.toFixed(1)}</td>
                        <td style={{padding:'0.2rem',textAlign:'right',color:'#a855f7'}}>{(r.iv*100).toFixed(2)}%</td>
                        <td style={{padding:'0.2rem',textAlign:'right',color:skew>0.005?'#f97316':skew<-0.005?'#00ff88':'var(--muted)'}}>{skew>0?'+':''}{(skew*100).toFixed(2)}%</td>
                        <td style={{padding:'0.2rem',textAlign:'right',color:'#00ff88'}}>{cur}{r.price.toFixed(3)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{marginTop:'0.4rem',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.3rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>ATM IV</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#00ff88',marginTop:'0.1rem'}}>{(sabrRes.atmIv*100).toFixed(2)}%</div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>25D SKEW</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#f97316',marginTop:'0.1rem'}}>
                    {((sabrRes.results.find(r=>r.moneyness===0.90)?.iv||0)-(sabrRes.results.find(r=>r.moneyness===1.10)?.iv||0)).toFixed(4)}
                  </div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>FORWARD</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:'#a855f7',marginTop:'0.1rem'}}>{cur}{sabrRes.forward.toFixed(2)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       MC PATH VISUALIZATION
    ═══════════════════════════════════════════════════ */
    function PathVisPanel({params,currency}){
      const{spot,rate,vol,maturity}=params;
      const cur=currency;
      const[pathRes,setPathRes]=useState(null);
      const chartRef=useRef(null);
      const chartInst=useRef(null);

      const run=()=>{
        const nPaths=20,steps=100,dt=maturity/steps;
        const paths=[];
        let maxS=spot,minS=spot;
        const finalPrices=[];
        for(let p=0;p<nPaths;p++){
          const path=[spot];
          let s=spot;
          for(let t=0;t<steps;t++){
            s*=Math.exp((rate-0.5*vol*vol)*dt+vol*Math.sqrt(dt)*randn());
            path.push(s);
            if(s>maxS)maxS=s;
            if(s<minS)minS=s;
          }
          paths.push(path);
          finalPrices.push(s);
        }
        // Stats
        const avgFinal=finalPrices.reduce((a,b)=>a+b,0)/nPaths;
        const sortedF=[...finalPrices].sort((a,b)=>a-b);
        const p5=sortedF[Math.floor(nPaths*0.05)];
        const p95=sortedF[Math.floor(nPaths*0.95)];
        const aboveStart=finalPrices.filter(s=>s>spot).length/nPaths;

        setPathRes({paths,maxS,minS,avgFinal,p5,p95,aboveStart,steps});

        // Chart
        setTimeout(()=>{
          if(!chartRef.current)return;
          if(chartInst.current)chartInst.current.destroy();
          const labels=Array.from({length:steps+1},(_,i)=>(i*maturity/steps).toFixed(2));
          const colors=['#00ff88','#f97316','#00d4ff','#a855f7','#ec4899','#ef4444','#84cc16','#06b6d4','#f59e0b','#8b5cf6'];
          chartInst.current=new Chart(chartRef.current,{
            type:'line',
            data:{
              labels,
              datasets:paths.slice(0,10).map((p,i)=>({
                label:'Path '+(i+1),
                data:p,
                borderColor:colors[i%colors.length],
                borderWidth:1,
                pointRadius:0,
                tension:0.1,
                fill:false,
              })),
            },
            options:{
              responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false}},
              scales:{
                x:{title:{display:true,text:'Time (years)',color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:8}},ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.04)'}},
                y:{title:{display:true,text:'Price',color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:8}},ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7}},grid:{color:'rgba(255,255,255,0.06)'}},
              },
            },
          });
        },50);

        gsap.fromTo('.path-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">GBM Path Visualization</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Simulate and visualize 20 GBM stock price paths. See the randomness that drives Monte Carlo pricing.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>SIMULATE PATHS</button>
          {pathRes&&(
            <div className="path-result" style={{marginTop:'0.7rem'}}>
              <div style={{height:'220px',marginBottom:'0.5rem'}}><canvas ref={chartRef}/></div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.3rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>AVG FINAL</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.65rem',color:'#00ff88',marginTop:'0.1rem'}}>{cur}{pathRes.avgFinal.toFixed(2)}</div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>5th-95th %ile</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'#f97316',marginTop:'0.1rem'}}>{cur}{pathRes.p5.toFixed(0)}–{cur}{pathRes.p95.toFixed(0)}</div>
                </div>
                <div style={{background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>% ABOVE START</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.65rem',color:'#00d4ff',marginTop:'0.1rem'}}>{(pathRes.aboveStart*100).toFixed(0)}%</div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>RANGE</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'#a855f7',marginTop:'0.1rem'}}>{cur}{pathRes.minS.toFixed(0)}–{cur}{pathRes.maxS.toFixed(0)}</div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       VARIANCE SWAP PANEL
    ═══════════════════════════════════════════════════ */
    function VarianceSwapPanel({params,currency}){
      const{spot,rate,vol,maturity,n}=params;
      const cur=currency;
      const[vsRes,setVsRes]=useState(null);
      const[vsBusy,setVsBusy]=useState(false);

      const run=()=>{
        setVsBusy(true);
        setTimeout(()=>{
          // Simulate realized variance via MC
          const N=Math.min(n,20000),steps=252,dt=maturity/steps;
          const realizedVars=[];
          for(let i=0;i<N;i++){
            let s=spot,sumLogRet2=0;
            for(let t=0;t<steps;t++){
              const z=randn();
              const sNew=s*Math.exp((rate-0.5*vol*vol)*dt+vol*Math.sqrt(dt)*z);
              const logRet=Math.log(sNew/s);
              sumLogRet2+=logRet*logRet;
              s=sNew;
            }
            realizedVars.push(sumLogRet2/maturity);
          }
          const fairVar=realizedVars.reduce((a,b)=>a+b,0)/N;
          const fairVol=Math.sqrt(fairVar);
          const impliedVar=vol*vol;
          const vrp=fairVar-impliedVar;
          // Scenarios
          const scenarios=[10,15,20,25,30,35,40,50].map(rv=>{
            const realVar=(rv/100)**2;
            const pnl=1e6/(2*fairVol)*(realVar-fairVar)*100;
            return{rv,realVar,pnl};
          });
          // Distribution stats
          const sorted=[...realizedVars].sort((a,b)=>a-b);
          const p5=sorted[Math.floor(N*0.05)],p95=sorted[Math.floor(N*0.95)];

          setVsRes({fairVar,fairVol,impliedVar,vrp,scenarios,p5,p95});
          setVsBusy(false);
          gsap.fromTo('.vs-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Variance Swap</span><div className="sdot"/></div>

          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run} disabled={vsBusy}>
            {vsBusy?'COMPUTING...':'PRICE VARIANCE SWAP'}
          </button>
          {vsRes&&(
            <div className="vs-result" style={{marginTop:'0.7rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.3rem',marginBottom:'0.5rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>FAIR VOL</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#00ff88',marginTop:'0.1rem'}}>{(vsRes.fairVol*100).toFixed(2)}%</div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>IMPLIED VOL</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#f97316',marginTop:'0.1rem'}}>{(vol*100).toFixed(1)}%</div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>VAR RISK PREMIUM</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#a855f7',marginTop:'0.1rem'}}>{(vsRes.vrp*10000).toFixed(1)}bp²</div>
                </div>

                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>RV 90% RANGE</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.6rem',color:'#00d4ff',marginTop:'0.1rem'}}>{(Math.sqrt(vsRes.p5)*100).toFixed(1)}–{(Math.sqrt(vsRes.p95)*100).toFixed(1)}%</div>

              </div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--accent)',letterSpacing:'0.12em',marginBottom:'0.25rem'}}>P&L SCENARIOS (1M VEGA NOTIONAL)</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.46rem'}}>

    /* ═══════════════════════════════════════════════════
       GREEKS HEATMAP PANEL
    ═══════════════════════════════════════════════════ */
    function GreeksHeatmapPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[greek,setGreek]=useState('delta');
      const[hmRes,setHmRes]=useState(null);

      const run=()=>{
        const nSpot=12,nTime=10;
        const spots=[];
        for(let i=0;i<nSpot;i++) spots.push(spot*0.7+spot*0.6*i/(nSpot-1));
        const times=[];
        for(let i=0;i<nTime;i++) times.push(0.05+1.95*i/(nTime-1));

        const grids={delta:[],gamma:[],vega:[],theta:[]};
        for(let ti=0;ti<nTime;ti++){
          const dRow=[],gRow=[],vRow=[],tRow=[];
          for(let si=0;si<nSpot;si++){
            const g=bsGreeks(spots[si],strike,rate,vol,times[ti]);
            if(g){
              dRow.push(g.callDelta);
              gRow.push(g.gamma);
              vRow.push(g.vega);
              tRow.push(g.callTheta);
            }else{
              dRow.push(0);gRow.push(0);vRow.push(0);tRow.push(0);
            }
          }
          grids.delta.push(dRow);
          grids.gamma.push(gRow);
          grids.vega.push(vRow);
          grids.theta.push(tRow);
        }
        setHmRes({grids,spots,times});
        gsap.fromTo('.hm-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      const heatColor=(val,min2,max2)=>{
        const t2=max2-min2>0?(val-min2)/(max2-min2):0.5;
        const r=Math.round(255*Math.max(0,Math.min(1,2*t2-1)));
        const g=Math.round(255*Math.max(0,Math.min(1,2*(1-t2)-0)));
        const b=Math.round(80*(1-Math.abs(2*t2-1)));
        return`rgba(${r},${g},${b},0.5)`;
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Greeks Heatmap</span><div className="sdot"/></div>
          <div style={{display:'flex',gap:'0.4rem',margin:'0.5rem 0'}}>
            {['delta','gamma','vega','theta'].map(g=>(
              <button key={g} className={'method-btn'+(greek===g?' active':'')} style={{fontSize:'0.5rem',padding:'0.2rem 0.5rem'}} onClick={()=>setGreek(g)}>{g.toUpperCase()}</button>
            ))}
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>GENERATE HEATMAP</button>
          {hmRes&&(
            <div className="hm-result" style={{marginTop:'0.7rem',overflowX:'auto'}}>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--accent)',letterSpacing:'0.1em',marginBottom:'0.3rem'}}>{greek.toUpperCase()} — SPOT × TIME</div>
              <table style={{borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.38rem'}}>
                <thead>
                  <tr>
                    <th style={{padding:'0.15rem 0.3rem',color:'var(--muted)'}}>S \ T</th>
                    {hmRes.times.map((t,i)=><th key={i} style={{padding:'0.15rem 0.25rem',color:'var(--muted)'}}>{t.toFixed(2)}y</th>)}
                  </tr>
                </thead>
                <tbody>
                  {hmRes.spots.map((s,si)=>{
                    const grid=hmRes.grids[greek];
                    const vals=grid.map(row=>row[si]);
                    const allVals=grid.flat();
                    const mn=Math.min(...allVals),mx=Math.max(...allVals);
                    return(
                      <tr key={si}>
                        <td style={{padding:'0.15rem 0.3rem',color:'var(--accent)',fontWeight:600}}>{cur}{s.toFixed(0)}</td>
                        {hmRes.times.map((t,ti)=>{
                          const v=grid[ti][si];
                          return <td key={ti} style={{padding:'0.1rem 0.2rem',textAlign:'center',background:heatColor(v,mn,mx),borderRadius:'2px',color:'rgba(255,255,255,0.8)'}}>{v.toFixed(greek==='gamma'?5:4)}</td>;
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       HISTORICAL VOL PANEL
    ═══════════════════════════════════════════════════ */
    function HistVolPanel({params,currency}){
      const{spot,rate,vol}=params;
      const cur=currency;
      const[hvRes,setHvRes]=useState(null);

      const run=()=>{
        // Generate synthetic price series
        const nDays=252,dt=1/252;
        const closes=[spot];
        let s=spot;
        for(let i=0;i<nDays;i++){
          s*=Math.exp((rate-0.5*vol*vol)*dt+vol*Math.sqrt(dt)*randn());
          closes.push(s);
        }
        // Close-to-close vol
        const logRet=[];
        for(let i=1;i<closes.length;i++) logRet.push(Math.log(closes[i]/closes[i-1]));
        const mean=logRet.reduce((a,b)=>a+b,0)/logRet.length;
        const variance=logRet.reduce((a,b)=>a+(b-mean)**2,0)/(logRet.length-1);
        const ccVol=Math.sqrt(variance*252);
        // Rolling 20-day vol
        const rolling=[];
        for(let i=20;i<logRet.length;i++){
          const w=logRet.slice(i-20,i);
          const m=w.reduce((a,b)=>a+b,0)/20;
          const v=w.reduce((a,b)=>a+(b-m)**2,0)/19;
          rolling.push(Math.sqrt(v*252));
        }
        // EWMA vol (lambda=0.94)
        const ewma=[logRet[0]**2*252];
        let ewVar=logRet[0]**2;
        for(let i=1;i<logRet.length;i++){
          ewVar=0.94*ewVar+0.06*logRet[i]**2;
          ewma.push(Math.sqrt(ewVar*252));
        }
        // Vol of vol
        const volOfVol=rolling.length>1?Math.sqrt(rolling.reduce((a,b)=>a+(b-rolling.reduce((x,y)=>x+y,0)/rolling.length)**2,0)/(rolling.length-1)):0;

        setHvRes({ccVol,rolling,ewma,closes,volOfVol,currentEwma:ewma[ewma.length-1]});
        gsap.fromTo('.hv-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Historical Volatility</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Simulates 252 trading days and computes realized vol via multiple estimators: close-to-close, 20-day rolling, EWMA (λ=0.94).
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>ESTIMATE HISTORICAL VOL</button>
          {hvRes&&(
            <div className="hv-result" style={{marginTop:'0.7rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.3rem',marginBottom:'0.5rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>CLOSE-TO-CLOSE</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#00ff88',marginTop:'0.1rem'}}>{(hvRes.ccVol*100).toFixed(1)}%</div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>EWMA (CURRENT)</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#f97316',marginTop:'0.1rem'}}>{(hvRes.currentEwma*100).toFixed(1)}%</div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>VOL OF VOL</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#a855f7',marginTop:'0.1rem'}}>{(hvRes.volOfVol*100).toFixed(1)}%</div>
                </div>
                <div style={{background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.12)',borderRadius:'6px',padding:'0.4rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>IMPLIED VS HIST</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.65rem',color:vol>hvRes.ccVol?'#f97316':'#00ff88',marginTop:'0.1rem'}}>{vol>hvRes.ccVol?'IV > HV':'HV > IV'}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)'}}>{((vol-hvRes.ccVol)*100).toFixed(1)}% spread</div>
                </div>
              </div>
              {/* Rolling vol mini sparkline */}
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',marginBottom:'0.15rem'}}>20-DAY ROLLING VOL</div>
              <div style={{display:'flex',height:'40px',alignItems:'flex-end',gap:'1px',borderRadius:'4px',background:'rgba(255,255,255,0.02)',padding:'2px'}}>
                {hvRes.rolling.filter((_,i)=>i%4===0).map((v,i)=>{
                  const maxV=Math.max(...hvRes.rolling);
                  const h=Math.max(2,v/maxV*36);
                  return <div key={i} style={{flex:1,height:h+'px',background:v>vol?'rgba(249,115,22,0.5)':'rgba(0,255,136,0.4)',borderRadius:'1px'}}/>;
                })}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontFamily:'JetBrains Mono',fontSize:'0.35rem',color:'var(--muted)',marginTop:'0.1rem'}}>
                <span>Day 20</span>
                <span style={{color:vol>hvRes.ccVol?'#f97316':'#00ff88'}}>— Implied Vol: {(vol*100).toFixed(0)}%</span>
                <span>Day 252</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       BINOMIAL TREE PANEL
    ═══════════════════════════════════════════════════ */
    function BinomialPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[steps,setSteps]=useState(200);
      const[isAm,setIsAm]=useState(false);
      const[btRes,setBtRes]=useState(null);

      const run=()=>{
        const dt=maturity/steps;
        const u=Math.exp(vol*Math.sqrt(dt)),d=1/u;
        const p=(Math.exp(rate*dt)-d)/(u-d);
        const disc=Math.exp(-rate*dt);

        const priceTree=(ot,am)=>{
          // Build terminal values
          const V=[];
          for(let j=0;j<=steps;j++){
            const ST=spot*Math.pow(u,steps-2*j);
            V.push(ot==='call'?Math.max(ST-strike,0):Math.max(strike-ST,0));
          }
          let earlyEx=0;
          for(let i=steps-1;i>=0;i--){
            for(let j=0;j<=i;j++){
              V[j]=disc*(p*V[j]+(1-p)*V[j+1]);
              if(am){
                const Si=spot*Math.pow(u,i-2*j);
                const ex=ot==='call'?Math.max(Si-strike,0):Math.max(strike-Si,0);
                if(ex>V[j]){V[j]=ex;earlyEx++;}
              }
            }
          }
          return{price:V[0],earlyEx};
        };

        const callE=priceTree('call',false);
        const putE=priceTree('put',false);
        const callA=priceTree('call',isAm);
        const putA=priceTree('put',isAm);
        const bsC=bsPrice(spot,strike,rate,vol,maturity,'call');
        const bsP=bsPrice(spot,strike,rate,vol,maturity,'put');

        // Convergence test
        const convSteps=[10,25,50,100,200,500];
        const conv=convSteps.map(n=>{
          const dt2=maturity/n,u2=Math.exp(vol*Math.sqrt(dt2)),d2=1/u2;
          const p2=(Math.exp(rate*dt2)-d2)/(u2-d2),dc2=Math.exp(-rate*dt2);
          const V2=[];
          for(let j=0;j<=n;j++) V2.push(Math.max(spot*Math.pow(u2,n-2*j)-strike,0));
          for(let i=n-1;i>=0;i--) for(let j=0;j<=i;j++) V2[j]=dc2*(p2*V2[j]+(1-p2)*V2[j+1]);
          return{n,price:V2[0],err:Math.abs(V2[0]-bsC)};
        });

        setBtRes({callE,putE,callA,putA,bsC,bsP,u,d,p,conv});
        gsap.fromTo('.bt-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Binomial Tree (CRR)</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.5rem'}}>
            Cox-Ross-Rubinstein discrete-time model. Exact for European and American options.
          </div>
          <div style={{display:'flex',gap:'0.5rem',alignItems:'center',marginBottom:'0.5rem'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem',flex:1}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>STEPS: {steps}</span>
              <input type="range" min="10" max="500" step="10" value={steps} onChange={e=>setSteps(+e.target.value)} style={{accentColor:'var(--accent)'}}/>
            </div>
            <button className={'method-btn'+(isAm?' active':'')} style={{fontSize:'0.5rem',padding:'0.25rem 0.6rem'}} onClick={()=>setIsAm(!isAm)}>
              {isAm?'AMERICAN':'EUROPEAN'}
            </button>
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>BUILD TREE</button>
          {btRes&&(
            <div className="bt-result" style={{marginTop:'0.7rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem',marginBottom:'0.5rem'}}>
                <div className="opt-card">
                  <div className="opt-type" style={{fontSize:'0.52rem'}}>BINOMIAL CALL</div>
                  <div className="opt-price call" style={{fontSize:'1rem'}}>{cur}{(isAm?btRes.callA:btRes.callE).price.toFixed(4)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)'}}>BS: {cur}{btRes.bsC.toFixed(4)} · Δ {Math.abs((isAm?btRes.callA:btRes.callE).price-btRes.bsC).toFixed(5)}</div>
                </div>
                <div className="opt-card">
                  <div className="opt-type" style={{fontSize:'0.52rem'}}>BINOMIAL PUT</div>
                  <div className="opt-price put" style={{fontSize:'1rem'}}>{cur}{(isAm?btRes.putA:btRes.putE).price.toFixed(4)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)'}}>BS: {cur}{btRes.bsP.toFixed(4)} · Δ {Math.abs((isAm?btRes.putA:btRes.putE).price-btRes.bsP).toFixed(5)}</div>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.3rem',marginBottom:'0.5rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>UP FACTOR (u)</div>

                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>RISK-NEUTRAL p</div>

                </div>
              </div>
              {/* Convergence table */}
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--accent)',letterSpacing:'0.1em',marginBottom:'0.2rem'}}>CONVERGENCE TO BLACK-SCHOLES</div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.46rem'}}>

    /* ═══════════════════════════════════════════════════
       DELTA HEDGING PANEL
    ═══════════════════════════════════════════════════ */
    function DeltaHedgePanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[freq,setFreq]=useState(1);
      const[dhRes,setDhRes]=useState(null);
      const[dhBusy,setDhBusy]=useState(false);

      const run=()=>{
        setDhBusy(true);
        setTimeout(()=>{
          const nSims=500,nDays=252,dt=maturity/nDays;
          const premium=bsPrice(spot,strike,rate,vol,maturity,'call');
          // Simulate hedge P&Ls for multiple frequencies
          const freqs=[{f:1,l:'Daily'},{f:2,l:'2-Day'},{f:5,l:'Weekly'},{f:10,l:'Bi-Weekly'},{f:21,l:'Monthly'}];
          const results=freqs.map(({f,l})=>{
            const pnls=[];
            for(let sim=0;sim<nSims;sim++){
              let S=spot,cash=premium,shares=0;
              for(let day=0;day<nDays;day++){
                const tLeft=maturity-day*dt;
                if(tLeft<=0)break;
                if(day%f===0){
                  const g=bsGreeks(S,strike,rate,vol,tLeft);
                  const newDelta=g?g.callDelta:0;
                  cash-=(newDelta-shares)*S;
                  shares=newDelta;
                }
                const z=randn();
                S=S*Math.exp((rate-0.5*vol*vol)*dt+vol*Math.sqrt(dt)*z);
                cash*=Math.exp(rate*dt);
              }
              cash+=shares*S;
              cash-=Math.max(S-strike,0);
              pnls.push(cash);
            }
            const mean=pnls.reduce((a,b)=>a+b,0)/nSims;
            const std=Math.sqrt(pnls.reduce((a,b)=>a+(b-mean)**2,0)/nSims);
            return{freq:l,days:f,mean,std,eff:1-std/premium};
          });
          setDhRes({results,premium});
          setDhBusy(false);
          gsap.fromTo('.dh-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Delta Hedging Simulation</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem',lineHeight:'1.5'}}>
            Sell a call at BS price, delta hedge dynamically. Shows how rebalancing frequency affects hedge P&L. Perfect hedge → P&L ≈ 0.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run} disabled={dhBusy}>
            {dhBusy?'SIMULATING 2500 HEDGES...':'RUN HEDGE SIMULATION'}
          </button>
          {dhRes&&(
            <div className="dh-result" style={{marginTop:'0.7rem'}}>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',marginBottom:'0.3rem'}}>
                Premium received: {cur}{dhRes.premium.toFixed(3)} · 500 simulations per frequency
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.48rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{padding:'0.25rem',textAlign:'left',color:'var(--muted)'}}>Frequency</th>
                    <th style={{padding:'0.25rem',textAlign:'right',color:'var(--muted)'}}>Mean P&L</th>
                    <th style={{padding:'0.25rem',textAlign:'right',color:'var(--muted)'}}>Std P&L</th>
                    <th style={{padding:'0.25rem',textAlign:'right',color:'var(--muted)'}}>Hedge Eff.</th>
                  </tr>
                </thead>
                <tbody>
                  {dhRes.results.map((r,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                      <td style={{padding:'0.25rem',color:'var(--text)'}}>{r.freq}</td>
                      <td style={{padding:'0.25rem',textAlign:'right',color:Math.abs(r.mean)<1?'#00ff88':'#f97316'}}>{r.mean>0?'+':''}{cur}{r.mean.toFixed(3)}</td>
                      <td style={{padding:'0.25rem',textAlign:'right',color:'var(--text)'}}>{cur}{r.std.toFixed(3)}</td>
                      <td style={{padding:'0.25rem',textAlign:'right'}}>
                        <span style={{color:r.eff>0.8?'#00ff88':r.eff>0.5?'#f97316':'#ef4444'}}>{(r.eff*100).toFixed(1)}%</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {/* Visual efficiency bars */}
              <div style={{marginTop:'0.5rem'}}>
                {dhRes.results.map((r,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:'0.4rem',marginBottom:'0.15rem'}}>
                    <span style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',width:'60px',textAlign:'right'}}>{r.freq}</span>
                    <div style={{flex:1,height:'8px',background:'rgba(255,255,255,0.05)',borderRadius:'4px',overflow:'hidden'}}>
                      <div style={{width:Math.max(0,r.eff*100)+'%',height:'100%',background:r.eff>0.8?'#00ff88':r.eff>0.5?'#f97316':'#ef4444',borderRadius:'4px',transition:'width 0.5s'}}/>
                    </div>
                    <span style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)',width:'35px'}}>{(r.eff*100).toFixed(0)}%</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       QUANTO OPTION PANEL
    ═══════════════════════════════════════════════════ */
    function QuantoPanel({params,currency}){
      const{spot,strike,vol,maturity}=params;
      const cur=currency;
      const[rd,setRd]=useState(0.05);
      const[rf,setRf]=useState(0.03);
      const[fxVol,setFxVol]=useState(0.10);
      const[corr,setCorr]=useState(0.30);
      const[res,setRes]=useState(null);

      const run=()=>{
        // Quanto-adjusted BS
        const qAdj=rf-rd+corr*vol*fxVol;
        const muQ=rd-qAdj;
        const sq=Math.sqrt(maturity);
        const d1=(Math.log(spot/strike)+(muQ+0.5*vol*vol)*maturity)/(vol*sq);
        const d2=d1-vol*sq;
        const dfQ=Math.exp(-qAdj*maturity),dfD=Math.exp(-rd*maturity);
        const callQ=spot*dfQ*normalCDF(d1)-strike*dfD*normalCDF(d2);
        const putQ=strike*dfD*normalCDF(-d2)-spot*dfQ*normalCDF(-d1);
        // Vanilla for comparison (no quanto adjustment, rate = foreign)
        const d1v=(Math.log(spot/strike)+(rf+0.5*vol*vol)*maturity)/(vol*sq);
        const d2v=d1v-vol*sq;
        const dfRf=Math.exp(-rf*maturity);
        const callV=spot*normalCDF(d1v)-strike*dfRf*normalCDF(d2v);
        const putV=strike*dfRf*normalCDF(-d2v)-spot*normalCDF(-d1v);
        setRes({callQ,putQ,callV,putV,muQ,qAdj});
        setTimeout(()=>gsap.fromTo('.quanto-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'}),10);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Quanto Option Pricing</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem',lineHeight:'1.5'}}>
            Quanto (quantity-adjusted) option pays in a different currency at a fixed FX rate. Drift is reduced by ρ·σ_S·σ_FX.
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.5rem',marginBottom:'0.6rem'}}>
            <div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>DOMESTIC RATE</div>
              <input type="number" step="0.005" value={rd} onChange={e=>setRd(parseFloat(e.target.value)||0)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}/>
            </div>
            <div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>FOREIGN RATE</div>
              <input type="number" step="0.005" value={rf} onChange={e=>setRf(parseFloat(e.target.value)||0)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}/>
            </div>
            <div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>FX VOL</div>
              <input type="number" step="0.01" value={fxVol} onChange={e=>setFxVol(parseFloat(e.target.value)||0)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}/>
            </div>
            <div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>CORRELATION</div>
              <input type="number" step="0.1" min="-1" max="1" value={corr} onChange={e=>setCorr(parseFloat(e.target.value)||0)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}/>
            </div>
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>PRICE QUANTO</button>
          {res&&(
            <div className="quanto-result" style={{marginTop:'0.7rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.6rem'}}>
                <div style={{padding:'0.6rem',background:'rgba(0,255,136,0.04)',borderLeft:'2px solid #00ff88',borderRadius:'4px'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>QUANTO CALL</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.8rem',color:'#00ff88'}}>{cur}{res.callQ.toFixed(3)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)'}}>vanilla: {cur}{res.callV.toFixed(3)} · Δ: {(res.callQ-res.callV>0?'+':'')}{(res.callQ-res.callV).toFixed(3)}</div>
                </div>
                <div style={{padding:'0.6rem',background:'rgba(249,115,22,0.04)',borderLeft:'2px solid #f97316',borderRadius:'4px'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>QUANTO PUT</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.8rem',color:'#f97316'}}>{cur}{res.putQ.toFixed(3)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)'}}>vanilla: {cur}{res.putV.toFixed(3)} · Δ: {(res.putQ-res.putV>0?'+':'')}{(res.putQ-res.putV).toFixed(3)}</div>
                </div>
              </div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginTop:'0.5rem',padding:'0.4rem',background:'rgba(255,255,255,0.02)',borderRadius:'4px'}}>
                Adjusted drift μ' = {res.muQ.toFixed(4)} · Quanto yield q' = {res.qAdj.toFixed(4)} · Quanto drag = ρ·σ_S·σ_FX = {(corr*vol*fxVol).toFixed(4)}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       DIVIDEND ADJUSTMENT PANEL
    ═══════════════════════════════════════════════════ */
    function DividendPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[mode,setMode]=useState('continuous');
      const[divYield,setDivYield]=useState(0.03);
      const[freq,setFreq]=useState('quarterly');
      const[res,setRes]=useState(null);

      const run=()=>{
        const sq=Math.sqrt(maturity);
        if(mode==='continuous'){
          const d1=(Math.log(spot/strike)+(rate-divYield+0.5*vol*vol)*maturity)/(vol*sq);
          const d2=d1-vol*sq;
          const dfQ=Math.exp(-divYield*maturity),dfR=Math.exp(-rate*maturity);
          const call=spot*dfQ*normalCDF(d1)-strike*dfR*normalCDF(d2);
          const put=strike*dfR*normalCDF(-d2)-spot*dfQ*normalCDF(-d1);
          // No-div vanilla
          const d1v=(Math.log(spot/strike)+(rate+0.5*vol*vol)*maturity)/(vol*sq);
          const d2v=d1v-vol*sq;
          const callV=spot*normalCDF(d1v)-strike*dfR*normalCDF(d2v);
          const putV=strike*dfR*normalCDF(-d2v)-spot*normalCDF(-d1v);
          setRes({mode:'continuous',call,put,callV,putV,deltaC:call-callV,deltaP:put-putV});
        }else{
          // Discrete: build schedule, subtract PV from spot, price vanilla
          const freqMap={monthly:12,quarterly:4,semiannual:2,annual:1};
          const nPerYear=freqMap[freq]||4;
          const nTotal=Math.floor(maturity*nPerYear);
          const perDiv=spot*divYield/nPerYear;
          let pvDivs=0;
          const divs=[];
          for(let i=1;i<=nTotal;i++){
            const t=i/nPerYear;
            if(t<=maturity){divs.push({t,d:perDiv});pvDivs+=perDiv*Math.exp(-rate*t);}
          }
          const spotAdj=spot-pvDivs;
          const d1=(Math.log(spotAdj/strike)+(rate+0.5*vol*vol)*maturity)/(vol*sq);
          const d2=d1-vol*sq;
          const dfR=Math.exp(-rate*maturity);
          const call=spotAdj*normalCDF(d1)-strike*dfR*normalCDF(d2);
          const put=strike*dfR*normalCDF(-d2)-spotAdj*normalCDF(-d1);
          // Vanilla (no div)
          const d1v=(Math.log(spot/strike)+(rate+0.5*vol*vol)*maturity)/(vol*sq);
          const d2v=d1v-vol*sq;
          const callV=spot*normalCDF(d1v)-strike*dfR*normalCDF(d2v);
          const putV=strike*dfR*normalCDF(-d2v)-spot*normalCDF(-d1v);
          setRes({mode:'discrete',call,put,callV,putV,deltaC:call-callV,deltaP:put-putV,spotAdj,pvDivs,nDivs:divs.length});
        }
        setTimeout(()=>gsap.fromTo('.div-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'}),10);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Dividend Adjustment</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem',lineHeight:'1.5'}}>
            Adjusts for dividends using continuous yield q (BSM) or discrete cash divs (escrowed model: subtract PV from spot).
          </div>
          <div style={{display:'flex',gap:'0.5rem',marginBottom:'0.6rem'}}>
            {[['continuous','Continuous q'],['discrete','Discrete Cash']].map(([k,l])=>(
              <button key={k} onClick={()=>setMode(k)} style={{flex:1,padding:'0.4rem',fontFamily:'JetBrains Mono',fontSize:'0.45rem',background:mode===k?'rgba(0,255,136,0.1)':'rgba(255,255,255,0.02)',border:'1px solid '+(mode===k?'#00ff88':'var(--border)'),color:mode===k?'#00ff88':'var(--muted)',cursor:'pointer',borderRadius:'4px'}}>{l}</button>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:mode==='discrete'?'1fr 1fr':'1fr',gap:'0.5rem',marginBottom:'0.6rem'}}>
            <div>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>DIVIDEND YIELD</div>
              <input type="number" step="0.005" value={divYield} onChange={e=>setDivYield(parseFloat(e.target.value)||0)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}/>
            </div>
            {mode==='discrete'&&(
              <div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginBottom:'0.2rem'}}>FREQUENCY</div>
                <select value={freq} onChange={e=>setFreq(e.target.value)} style={{width:'100%',background:'rgba(255,255,255,0.03)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.35rem',fontFamily:'JetBrains Mono',fontSize:'0.5rem',borderRadius:'4px'}}>
                  <option value="monthly">Monthly</option>
                  <option value="quarterly">Quarterly</option>
                  <option value="semiannual">Semi-Annual</option>
                  <option value="annual">Annual</option>
                </select>
              </div>
            )}
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={run}>APPLY DIVIDEND ADJUSTMENT</button>
          {res&&(
            <div className="div-result" style={{marginTop:'0.7rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0.6rem'}}>
                <div style={{padding:'0.6rem',background:'rgba(0,255,136,0.04)',borderLeft:'2px solid #00ff88',borderRadius:'4px'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>CALL (DIV-ADJ)</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.8rem',color:'#00ff88'}}>{cur}{res.call.toFixed(3)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)'}}>vanilla: {cur}{res.callV.toFixed(3)} · Δ: {res.deltaC>0?'+':''}{res.deltaC.toFixed(3)}</div>
                </div>
                <div style={{padding:'0.6rem',background:'rgba(249,115,22,0.04)',borderLeft:'2px solid #f97316',borderRadius:'4px'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>PUT (DIV-ADJ)</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.8rem',color:'#f97316'}}>{cur}{res.put.toFixed(3)}</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.38rem',color:'var(--muted)'}}>vanilla: {cur}{res.putV.toFixed(3)} · Δ: {res.deltaP>0?'+':''}{res.deltaP.toFixed(3)}</div>
                </div>
              </div>
              {res.mode==='discrete'&&(
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',marginTop:'0.5rem',padding:'0.4rem',background:'rgba(255,255,255,0.02)',borderRadius:'4px'}}>
                  {res.nDivs} discrete divs · PV = {cur}{res.pvDivs.toFixed(3)} · S_adj = {cur}{res.spotAdj.toFixed(3)}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }
