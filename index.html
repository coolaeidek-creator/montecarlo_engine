<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monte Carlo Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --green:  #00ff88;
      --blue:   #00d4ff;
      --purple: #a855f7;
      --orange: #f97316;
      --pink:   #ec4899;
      --bg:     #030712;
      --text:   #e2e8f0;
      --muted:  rgba(226,232,240,0.45);
      --border: rgba(255,255,255,0.07);
      --glass:  rgba(3,7,18,0.78);
    }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* subtle scanlines */
    body::after {
      content:''; position:fixed; inset:0; z-index:200; pointer-events:none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
    }

    #bg {
      position:fixed; inset:0; width:100%; height:100%; z-index:0;
      display:block;
    }

    /* subtle grid */
    #root::before {
      content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,255,136,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.018) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    #root {
      position:fixed; inset:0; z-index:10;
      display:flex; flex-direction:column;
      padding: 1.6rem 2rem 1.4rem;
      gap: 1.1rem;
      overflow:hidden;
      pointer-events:none;
    }

    /* ── Header ─────────────────────────────────────── */
    .header { text-align:center; flex-shrink:0; }

    .badge {
      display:inline-flex; align-items:center; gap:0.45rem;
      font-family:'JetBrains Mono',monospace;
      font-size:0.58rem; letter-spacing:0.3em;
      color:var(--green);
      border:1px solid rgba(0,255,136,0.22);
      padding:0.22rem 0.85rem; border-radius:100px;
      background:rgba(0,255,136,0.06);
      margin-bottom:0.55rem;
    }
    .badge-dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--green); box-shadow:0 0 7px var(--green);
      animation:breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.25} }

    h1 {
      font-family:'JetBrains Mono',monospace;
      font-size:clamp(1.5rem,3.2vw,2.6rem);
      font-weight:600; line-height:1; letter-spacing:-0.02em;
      background: linear-gradient(128deg, #ffffff 25%, var(--green) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 42px rgba(0,255,136,0.28));
    }
    .subtitle {
      font-size:0.62rem; letter-spacing:0.38em;
      color:var(--muted); text-transform:uppercase; margin-top:0.28rem;
    }
    .header-tags {
      display:flex; align-items:center; justify-content:center;
      gap:0.55rem; margin-top:0.5rem;
      font-size:0.6rem; color:var(--muted);
      font-family:'JetBrains Mono',monospace; letter-spacing:0.07em;
    }
    .tag-sep { color:rgba(0,255,136,0.35); }

    /* ── Layout ──────────────────────────────────────── */
    .panels {
      display:flex; gap:1.2rem;
      flex:1; min-height:0;
      justify-content:center; align-items:flex-start;
      pointer-events:all;
    }

    .glass {
      position:relative; overflow:hidden;
      background:var(--glass);
      backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
      border:1px solid var(--border);
      border-radius:18px; padding:1.2rem;
      display:flex; flex-direction:column; gap:0.9rem;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.045),
        0 24px 64px rgba(0,0,0,0.65),
        0 0 100px rgba(0,255,136,0.02);
    }
    /* top inner glow line */
    .glass::after {
      content:''; position:absolute; top:0; left:8%; right:8%; height:1px;
      background:linear-gradient(90deg, transparent, rgba(0,255,136,0.25), transparent);
      pointer-events:none;
    }

    .control-panel { width:292px; flex-shrink:0; }
    .result-panel  { width:356px; flex-shrink:0; }

    /* ── Card header ─────────────────────────────────── */
    .card-head {
      display:flex; align-items:center; justify-content:space-between;
      padding-bottom:0.8rem; border-bottom:1px solid var(--border);
    }
    .card-tag {
      font-family:'JetBrains Mono',monospace;
      font-size:0.57rem; letter-spacing:0.25em;
      color:var(--muted); text-transform:uppercase;
    }
    .sdot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.13); }
    .sdot.live {
      background:var(--green); box-shadow:0 0 8px var(--green);
      animation:breathe 2.2s ease-in-out infinite;
    }

    /* ── Sliders ─────────────────────────────────────── */
    .slider-list { display:flex; flex-direction:column; gap:0.8rem; }
    .s-row { display:flex; flex-direction:column; gap:0.32rem; }
    .s-head { display:flex; justify-content:space-between; align-items:baseline; }
    .s-label {
      font-size:0.62rem; font-weight:500; letter-spacing:0.08em;
      color:var(--muted); text-transform:uppercase;
    }
    .s-val {
      font-family:'JetBrains Mono',monospace;
      font-size:0.7rem; font-weight:500; color:var(--green);
    }
    .s-track {
      position:relative; height:3px;
      background:rgba(255,255,255,0.07); border-radius:100px;
    }
    .s-fill {
      position:absolute; inset:0; right:auto;
      background:linear-gradient(90deg, var(--green), var(--blue));
      border-radius:100px; pointer-events:none;
    }
    input[type=range] {
      position:absolute; top:50%; transform:translateY(-50%);
      left:-2px; width:calc(100% + 4px);
      appearance:none; -webkit-appearance:none;
      background:transparent; cursor:pointer; height:18px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none;
      width:13px; height:13px; border-radius:50%;
      background:#fff; border:2px solid var(--green);
      box-shadow:0 0 10px rgba(0,255,136,0.55);
      transition:box-shadow .18s, transform .18s;
    }
    input[type=range]:hover::-webkit-slider-thumb {
      box-shadow:0 0 20px rgba(0,255,136,0.9); transform:scale(1.18);
    }
    input[type=range]::-moz-range-thumb {
      width:13px; height:13px; border-radius:50%;
      background:#fff; border:2px solid var(--green);
      box-shadow:0 0 10px rgba(0,255,136,0.55);
    }

    /* ── Run button ──────────────────────────────────── */
    .run-btn {
      width:100%; padding:0.78rem;
      background:linear-gradient(135deg, rgba(0,255,136,0.11), rgba(0,212,255,0.11));
      border:1px solid rgba(0,255,136,0.26); border-radius:12px;
      color:var(--green);
      font-family:'JetBrains Mono',monospace;
      font-size:0.7rem; font-weight:600; letter-spacing:0.18em;
      cursor:pointer; transition:box-shadow .2s, background .2s;
      display:flex; align-items:center; justify-content:center; gap:0.45rem;
      position:relative; overflow:hidden;
    }
    .run-btn:hover:not(:disabled) { box-shadow:0 0 36px rgba(0,255,136,0.22); }
    .run-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .spin {
      width:11px; height:11px;
      border:2px solid rgba(0,255,136,0.2); border-top-color:var(--green);
      border-radius:50%; animation:rotate .7s linear infinite;
    }
    @keyframes rotate { to { transform:rotate(360deg); } }

    /* ── Result cards ────────────────────────────────── */
    .opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.7rem; }

    .opt-card {
      padding:0.85rem 0.9rem; border-radius:12px;
      border:1px solid rgba(255,255,255,0.05);
      background:rgba(255,255,255,0.02);
      display:flex; flex-direction:column; gap:0.35rem;
    }
    .opt-type {
      font-family:'JetBrains Mono',monospace;
      font-size:0.54rem; letter-spacing:0.22em; color:var(--muted);
    }
    .opt-price {
      font-family:'JetBrains Mono',monospace;
      font-size:1.6rem; font-weight:600; line-height:1;
    }
    .opt-price.call { color:var(--green); text-shadow:0 0 28px rgba(0,255,136,0.38); }
    .opt-price.put  { color:var(--orange); text-shadow:0 0 28px rgba(249,115,22,0.38); }
    .opt-se, .opt-ci {
      font-family:'JetBrains Mono',monospace;
      font-size:0.58rem; color:var(--muted); line-height:1.4;
    }
    .opt-bar { height:2px; border-radius:100px; background:rgba(255,255,255,0.05); margin-top:0.3rem; overflow:hidden; }
    .opt-bar-fill {
      height:100%; border-radius:100px;
      transition:width 1.1s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .opt-bar-fill.call { background:linear-gradient(90deg, var(--green), rgba(0,255,136,0.15)); }
    .opt-bar-fill.put  { background:linear-gradient(90deg, var(--orange), rgba(249,115,22,0.15)); }

    /* ── Parity ──────────────────────────────────────── */
    .parity {
      padding:0.85rem 0.9rem; border-radius:12px;
      border:1px solid rgba(255,255,255,0.05);
      background:rgba(255,255,255,0.02);
    }
    .parity-title {
      font-family:'JetBrains Mono',monospace;
      font-size:0.54rem; letter-spacing:0.22em; color:var(--muted); margin-bottom:0.55rem;
    }
    .p-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:0.22rem 0; font-size:0.68rem;
    }
    .p-key { font-family:'JetBrains Mono',monospace; color:var(--muted); }
    .p-val { font-family:'JetBrains Mono',monospace; color:var(--text); }
    .p-row.err { border-top:1px solid var(--border); margin-top:0.3rem; padding-top:0.52rem; }
    .p-val.ok   { color:var(--green); }
    .p-val.warn { color:var(--orange); }

    /* ── Sim info ────────────────────────────────────── */
    .sim-info {
      display:flex; align-items:center; justify-content:center; gap:0.4rem;
      font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--muted);
    }
    .sim-n { color:var(--blue); }

    /* ── Empty ───────────────────────────────────────── */
    .empty { flex:1; display:flex; align-items:center; justify-content:center; }
    .dots  { display:flex; gap:0.32rem; }
    .dots span {
      width:5px; height:5px; border-radius:50%; background:var(--green);
      animation:pop 1.4s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay:.2s; }
    .dots span:nth-child(3) { animation-delay:.4s; }
    @keyframes pop { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-6px);opacity:1} }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════════
       MATH UTILITIES
    ═══════════════════════════════════════════════════ */
    function randn() {
      let u = 0, v = 0;
      while (!u) u = Math.random();
      while (!v) v = Math.random();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    function mcPrice(S, K, r, sigma, T, N, type) {
      const drift = (r - 0.5 * sigma * sigma) * T;
      const diff  = sigma * Math.sqrt(T);
      let sum = 0, sumSq = 0;
      for (let i = 0; i < N; i++) {
        const ST  = S * Math.exp(drift + diff * randn());
        const pay = type === 'call' ? Math.max(ST - K, 0) : Math.max(K - ST, 0);
        sum   += pay;
        sumSq += pay * pay;
      }
      const df = Math.exp(-r * T);
      const mu = sum / N;
      const v2 = Math.max(sumSq / N - mu * mu, 0);
      const se = df * Math.sqrt(v2 / N);
      const p  = df * mu;
      return { price: p, se, ci: [p - 1.96 * se, p + 1.96 * se] };
    }

    function gbmPath(S0, r, sigma, T, steps) {
      const dt = T / steps;
      let S = S0, arr = [S0];
      for (let i = 0; i < steps; i++) {
        S *= Math.exp((r - 0.5 * sigma * sigma) * dt + sigma * Math.sqrt(dt) * randn());
        arr.push(S);
      }
      return arr;
    }

    /* ═══════════════════════════════════════════════════
       THREE.JS SCENE
    ═══════════════════════════════════════════════════ */
    class Scene3D {
      constructor(canvas) {
        this.canvas = canvas;
        this.t = 0;
        this.raf = null;
        this.pathMeshes = [];
        this._orbPh = [];

        this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        this.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        this.renderer.setSize(innerWidth, innerHeight);
        this.renderer.setClearColor(0x030712);

        this.scene  = new THREE.Scene();
        this.scene.fog = new THREE.FogExp2(0x030712, 0.016);
        this.camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
        this.camera.position.set(0, 0, 32);

        this._buildStars();
        this._buildWireframes();
        this._buildOrbs();
        this.buildPaths(0.05, 0.2, 1.0);

        this._onResize = () => {
          this.renderer.setSize(innerWidth, innerHeight);
          this.camera.aspect = innerWidth / innerHeight;
          this.camera.updateProjectionMatrix();
        };
        window.addEventListener('resize', this._onResize);
        this._tick();
      }

      _buildStars() {
        const n = 4000;
        const pos = new Float32Array(n * 3);
        for (let i = 0; i < n * 3; i++) pos[i] = (Math.random() - 0.5) * 280;
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        this.stars = new THREE.Points(g, new THREE.PointsMaterial({
          size: 0.11, color: 0xffffff, transparent: true, opacity: 0.52
        }));
        this.scene.add(this.stars);
      }

      _buildWireframes() {
        const add = (r, detail, col, op) => {
          const m = new THREE.Mesh(
            new THREE.IcosahedronGeometry(r, detail),
            new THREE.MeshBasicMaterial({ color: col, wireframe: true, transparent: true, opacity: op })
          );
          this.scene.add(m);
          return m;
        };
        this.ico1 = add(10, 1, 0x00ff88, 0.055);
        this.ico2 = add( 6, 1, 0x00d4ff, 0.095);
        this.ico3 = add( 3, 1, 0xa855f7, 0.16);

        // Torus ring
        this.ring = new THREE.Mesh(
          new THREE.TorusGeometry(14, 0.06, 8, 120),
          new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.12 })
        );
        this.ring.rotation.x = Math.PI / 2.8;
        this.scene.add(this.ring);
      }

      _buildOrbs() {
        const cols = [0x00ff88, 0x00d4ff, 0xa855f7, 0xf97316, 0xec4899, 0x3b82f6, 0xfbbf24];
        this.orbs = cols.map((c) => {
          const m = new THREE.Mesh(
            new THREE.SphereGeometry(0.3 + Math.random() * 0.5, 16, 16),
            new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.45 })
          );
          m.position.set(
            (Math.random() - 0.5) * 32,
            (Math.random() - 0.5) * 20,
            -8 + (Math.random() - 0.5) * 10
          );
          this._orbPh.push(Math.random() * Math.PI * 2);
          this.scene.add(m);
          return m;
        });
      }

      buildPaths(r, sigma, T) {
        this.pathMeshes.forEach(m => {
          this.scene.remove(m);
          m.geometry.dispose();
          m.material.dispose();
        });
        this.pathMeshes = [];

        const PALETTE = [
          0x00ff88, 0x00d4ff, 0xa855f7, 0xf97316, 0xec4899,
          0x3b82f6, 0xfbbf24, 0x10b981, 0x8b5cf6, 0xef4444,
          0x06b6d4, 0x84cc16, 0xf43f5e, 0x14b8a6, 0x6366f1,
          0x00ff88, 0x00d4ff, 0xa855f7, 0xf97316, 0xec4899,
          0x3b82f6, 0x10b981,
        ];

        const N = 22, STEPS = 64, XL = -14, XR = 14;

        for (let i = 0; i < N; i++) {
          const prices  = gbmPath(100, r, sigma, T, STEPS);
          const zOff    = -22 + (i / N) * 44;
          const minP    = Math.min(...prices);
          const maxP    = Math.max(...prices);
          const range   = maxP - minP || 1;
          const yScale  = 11;

          const pts = prices.map((p, j) => new THREE.Vector3(
            XL + (j / STEPS) * (XR - XL),
            ((p - minP) / range - 0.5) * yScale,
            zOff
          ));

          const curve = new THREE.CatmullRomCurve3(pts);
          const geom  = new THREE.TubeGeometry(curve, 64, 0.038, 6, false);
          const mat   = new THREE.MeshBasicMaterial({
            color: PALETTE[i % PALETTE.length],
            transparent: true,
            opacity: 0.5 + Math.random() * 0.35,
          });
          const mesh = new THREE.Mesh(geom, mat);
          this.pathMeshes.push(mesh);
          this.scene.add(mesh);
        }
      }

      _tick() {
        this.raf = requestAnimationFrame(() => this._tick());
        this.t += 0.0038;

        this.stars.rotation.y = this.t * 0.012;
        this.stars.rotation.x = this.t * 0.006;

        this.ico1.rotation.x =  this.t * 0.22;
        this.ico1.rotation.y =  this.t * 0.31;
        this.ico2.rotation.x = -this.t * 0.35;
        this.ico2.rotation.y =  this.t * 0.26;
        this.ico3.rotation.x =  this.t * 0.48;
        this.ico3.rotation.z = -this.t * 0.38;
        this.ring.rotation.z =  this.t * 0.18;

        this.orbs.forEach((orb, i) => {
          orb.position.y += Math.sin(this.t * 0.45 + this._orbPh[i]) * 0.005;
          orb.rotation.x = this.t * 0.3;
        });

        this.pathMeshes.forEach((m, i) => {
          m.position.y = Math.sin(this.t * 0.28 + i * 0.38) * 0.35;
        });

        // Lazy camera drift
        this.camera.position.x = Math.sin(this.t * 0.065) * 4.5;
        this.camera.position.y = Math.sin(this.t * 0.048) * 2.8;
        this.camera.lookAt(0, 0, 0);

        this.renderer.render(this.scene, this.camera);
      }

      destroy() {
        cancelAnimationFrame(this.raf);
        window.removeEventListener('resize', this._onResize);
        this.renderer.dispose();
      }
    }

    /* ═══════════════════════════════════════════════════
       ANIMATED NUMBER
    ═══════════════════════════════════════════════════ */
    function AnimNum({ value, dec = 4, pre = '' }) {
      const ref  = useRef(null);
      const prev = useRef(value);

      useEffect(() => {
        const obj = { v: prev.current };
        gsap.to(obj, {
          v: value, duration: 1.0, ease: 'power2.out',
          onUpdate() { if (ref.current) ref.current.textContent = pre + obj.v.toFixed(dec); },
          onComplete() { prev.current = value; },
        });
      }, [value, dec, pre]);

      return <span ref={ref}>{pre}{value.toFixed(dec)}</span>;
    }

    /* ═══════════════════════════════════════════════════
       SLIDER
    ═══════════════════════════════════════════════════ */
    function Slider({ label, value, min, max, step, fmt, onChange }) {
      const pct = ((value - min) / (max - min)) * 100;
      return (
        <div className="s-row">
          <div className="s-head">
            <span className="s-label">{label}</span>
            <span className="s-val">{fmt(value)}</span>
          </div>
          <div className="s-track">
            <div className="s-fill" style={{ width: `${pct}%` }} />
            <input type="range" min={min} max={max} step={step} value={value}
              onChange={e => onChange(+e.target.value)} />
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════════ */
    function App() {
      const scene3d = useRef(null);

      const [params, setParams] = useState({
        spot: 100, strike: 100, rate: 0.05, vol: 0.20, maturity: 1.0, n: 50000
      });
      const [res,  setRes]  = useState(null);
      const [busy, setBusy] = useState(false);

      useEffect(() => {
        const canvas = document.getElementById('bg');
        scene3d.current = new Scene3D(canvas);

        // Entrance animations
        gsap.fromTo('.header',
          { y: -44, opacity: 0 },
          { y: 0, opacity: 1, duration: 1.05, ease: 'power3.out', delay: 0.1 }
        );
        gsap.fromTo('.control-panel',
          { x: -55, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.95, ease: 'power3.out', delay: 0.45 }
        );
        gsap.fromTo('.result-panel',
          { x: 55, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.95, ease: 'power3.out', delay: 0.65 }
        );

        // Auto-run
        const timer = setTimeout(() => runSim({ spot:100, strike:100, rate:0.05, vol:0.20, maturity:1.0, n:50000 }), 1500);
        return () => {
          clearTimeout(timer);
          scene3d.current?.destroy();
        };
      }, []);

      const runSim = useCallback((p) => {
        setBusy(true);
        setTimeout(() => {
          const call = mcPrice(p.spot, p.strike, p.rate, p.vol, p.maturity, p.n, 'call');
          const put  = mcPrice(p.spot, p.strike, p.rate, p.vol, p.maturity, p.n, 'put');
          const df   = Math.exp(-p.rate * p.maturity);
          const lhs  = call.price - put.price;
          const rhs  = p.spot - p.strike * df;
          setRes({ call, put, lhs, rhs, err: Math.abs(lhs - rhs) });
          setBusy(false);

          scene3d.current?.buildPaths(p.rate, p.vol, p.maturity);

          gsap.fromTo('.opt-card',
            { y: 10, opacity: 0 },
            { y: 0, opacity: 1, stagger: 0.07, duration: 0.5, ease: 'back.out(1.5)' }
          );
          gsap.fromTo('.parity, .sim-info',
            { y: 8, opacity: 0 },
            { y: 0, opacity: 1, stagger: 0.06, duration: 0.45, ease: 'power2.out', delay: 0.15 }
          );
        }, 30);
      }, []);

      const set = (k, v) => setParams(p => ({ ...p, [k]: v }));

      const handleRun = () => {
        gsap.to('.run-btn', { scale: 0.95, duration: 0.09, yoyo: true, repeat: 1, ease: 'power1.inOut' });
        runSim(params);
      };

      const confPct = (se, price) =>
        price ? Math.max(6, Math.min(94, (1 - Math.min(se / price * 25, 1)) * 100)) : 50;

      return (
        <>
          {/* ── Header ── */}
          <header className="header">
            <div className="badge"><span className="badge-dot" />QUANTITATIVE FINANCE</div>
            <h1>MONTE CARLO ENGINE</h1>
            <p className="subtitle">Options Pricing via Geometric Brownian Motion</p>
            <div className="header-tags">
              <span>European Options</span>
              <span className="tag-sep">·</span>
              <span>Risk-Neutral Pricing</span>
              <span className="tag-sep">·</span>
              <span>GBM Simulation</span>
            </div>
          </header>

          {/* ── Panels ── */}
          <div className="panels">

            {/* Controls */}
            <div className="glass control-panel">
              <div className="card-head">
                <span className="card-tag">Market Parameters</span>
                <div className="sdot" />
              </div>

              <div className="slider-list">
                <Slider label="Spot Price"       value={params.spot}     min={20}   max={300}   step={1}     fmt={v=>`$${v}`}                   onChange={v=>set('spot',v)} />
                <Slider label="Strike Price"     value={params.strike}   min={20}   max={300}   step={1}     fmt={v=>`$${v}`}                   onChange={v=>set('strike',v)} />
                <Slider label="Risk-free Rate"   value={params.rate}     min={0}    max={0.20}  step={0.001} fmt={v=>`${(v*100).toFixed(1)}%`}  onChange={v=>set('rate',v)} />
                <Slider label="Volatility σ"     value={params.vol}      min={0.05} max={0.85}  step={0.01}  fmt={v=>`${(v*100).toFixed(0)}%`}  onChange={v=>set('vol',v)} />
                <Slider label="Time to Maturity" value={params.maturity} min={0.1}  max={3.0}   step={0.1}   fmt={v=>`${v.toFixed(1)} yr`}      onChange={v=>set('maturity',v)} />
                <Slider label="Simulations"      value={params.n}        min={1000} max={100000} step={1000} fmt={v=>`${(v/1000).toFixed(0)}K`} onChange={v=>set('n',v)} />
              </div>

              <button className="run-btn" onClick={handleRun} disabled={busy}>
                {busy
                  ? <><span className="spin" />COMPUTING…</>
                  : <>▶ &nbsp;RUN SIMULATION</>
                }
              </button>
            </div>

            {/* Results */}
            <div className="glass result-panel">
              <div className="card-head">
                <span className="card-tag">Results</span>
                <div className={`sdot ${res ? 'live' : ''}`} />
              </div>

              {res ? (
                <>
                  <div className="opt-grid">
                    {/* Call */}
                    <div className="opt-card">
                      <div className="opt-type">CALL OPTION</div>
                      <div className="opt-price call">
                        <AnimNum value={res.call.price} dec={4} pre="$" />
                      </div>
                      <div className="opt-se">
                        σ̂ = <AnimNum value={res.call.se} dec={5} pre="$" />
                      </div>
                      <div className="opt-ci">
                        95% CI: [<AnimNum value={res.call.ci[0]} dec={3} pre="$" />,&nbsp;
                        <AnimNum value={res.call.ci[1]} dec={3} pre="$" />]
                      </div>
                      <div className="opt-bar">
                        <div className="opt-bar-fill call" style={{ width: `${confPct(res.call.se, res.call.price)}%` }} />
                      </div>
                    </div>

                    {/* Put */}
                    <div className="opt-card">
                      <div className="opt-type">PUT OPTION</div>
                      <div className="opt-price put">
                        <AnimNum value={res.put.price} dec={4} pre="$" />
                      </div>
                      <div className="opt-se">
                        σ̂ = <AnimNum value={res.put.se} dec={5} pre="$" />
                      </div>
                      <div className="opt-ci">
                        95% CI: [<AnimNum value={res.put.ci[0]} dec={3} pre="$" />,&nbsp;
                        <AnimNum value={res.put.ci[1]} dec={3} pre="$" />]
                      </div>
                      <div className="opt-bar">
                        <div className="opt-bar-fill put" style={{ width: `${confPct(res.put.se, res.put.price)}%` }} />
                      </div>
                    </div>
                  </div>

                  {/* Put-Call Parity */}
                  <div className="parity">
                    <div className="parity-title">PUT-CALL PARITY CHECK</div>
                    <div className="p-row">
                      <span className="p-key">C − P</span>
                      <span className="p-val"><AnimNum value={res.lhs} dec={4} pre="$" /></span>
                    </div>
                    <div className="p-row">
                      <span className="p-key">S − K · e⁻ʳᵀ</span>
                      <span className="p-val"><AnimNum value={res.rhs} dec={4} pre="$" /></span>
                    </div>
                    <div className="p-row err">
                      <span className="p-key">Δ error</span>
                      <span className={`p-val ${res.err < 0.15 ? 'ok' : 'warn'}`}>
                        <AnimNum value={res.err} dec={6} pre="$" />
                      </span>
                    </div>
                  </div>

                  <div className="sim-info">
                    <span>Monte Carlo paths:</span>
                    <span className="sim-n">{params.n.toLocaleString()}</span>
                  </div>
                </>
              ) : (
                <div className="empty">
                  <div className="dots"><span /><span /><span /></div>
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
