    /* ═══════════════════════════════════════════════════
       GREEKS SENSITIVITY CHART
    ═══════════════════════════════════════════════════ */
    function GreeksSurface({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const canvasRef=useRef(null);
      const chartRef=useRef(null);
      const[greek,setGreek]=useState('delta');

      useEffect(()=>{
        if(!canvasRef.current)return;
        if(chartRef.current)chartRef.current.destroy();
        const step=spot>5000?100:spot>500?10:spot>50?2:1;
        const lo=Math.max(step,Math.round(spot*0.5/step)*step);
        const hi=Math.round(spot*1.5/step)*step;
        const spots=[];
        for(let s=lo;s<=hi;s+=step) spots.push(s);

        const callVals=[],putVals=[];
        for(const s of spots){
          const g=bsGreeks(s,strike,rate,vol,maturity);
          if(!g){callVals.push(0);putVals.push(0);continue;}
          if(greek==='delta'){callVals.push(g.callDelta);putVals.push(g.putDelta);}
          else if(greek==='gamma'){callVals.push(g.gamma);putVals.push(g.gamma);}
          else if(greek==='theta'){callVals.push(g.callTheta);putVals.push(g.putTheta);}
          else if(greek==='vega'){callVals.push(g.vega);putVals.push(g.vega);}
        }

        const datasets=[
          {label:'Call '+greek.charAt(0).toUpperCase()+greek.slice(1),data:callVals,borderColor:'#00ff88',borderWidth:2,pointRadius:0,tension:0.3,fill:false},
        ];
        if(greek==='delta'||greek==='theta'){
          datasets.push({label:'Put '+greek.charAt(0).toUpperCase()+greek.slice(1),data:putVals,borderColor:'#f97316',borderWidth:2,pointRadius:0,tension:0.3,fill:false});
        }
        // Add strike vertical reference
        const strikeIdx=spots.findIndex(s=>s>=strike);

        const greekColors={delta:'#00ff88',gamma:'#00d4ff',theta:'#ec4899',vega:'#a855f7'};
        chartRef.current=new Chart(canvasRef.current,{
          type:'line',
          data:{labels:spots.map(s=>s.toString()),datasets},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{labels:{color:'rgba(226,232,240,0.6)',font:{family:'JetBrains Mono',size:9},boxWidth:12}},
              tooltip:{backgroundColor:'rgba(3,7,18,0.92)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:10},
                callbacks:{title:c=>'Spot = '+cur+c[0].label,label:c=>c.dataset.label+': '+c.raw.toFixed(4)}},
              vline:{lines:[{value:strikeIdx,color:'rgba(255,255,255,0.25)',dash:[4,4],label:'K='+cur+strike}]},
            },
            scales:{
              x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8,callback:(v,i)=>cur+spots[i]}},
              y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},callback:v=>v.toFixed(3)}},
            }
          }
        });
      },[spot,strike,rate,vol,maturity,greek]);

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Greeks Sensitivity</span><div className="sdot live"/></div>
          <div style={{display:'flex',gap:'0.3rem',margin:'0.4rem 0'}}>
            {['delta','gamma','theta','vega'].map(g=>(
              <button key={g} className={'method-btn'+(greek===g?' active':'')} style={{fontSize:'0.5rem',padding:'0.2rem 0.5rem'}} onClick={()=>setGreek(g)}>
                {g.toUpperCase()}
              </button>
            ))}
          </div>
          <div style={{height:'200px',position:'relative'}}>
            <canvas ref={canvasRef}/>
          </div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',marginTop:'0.3rem'}}>
            {greek==='delta'&&'How option value changes per $1 stock move (call: 0→1, put: -1→0)'}
            {greek==='gamma'&&'Rate of change of delta — peaks at ATM, measures convexity risk'}
            {greek==='theta'&&'Daily time decay — negative for long options, steepest near ATM at expiry'}
            {greek==='vega'&&'Sensitivity to 1% change in implied volatility — highest at ATM'}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       STRATEGY P&L BUILDER
    ═══════════════════════════════════════════════════ */
    function StrategyBuilder({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const canvasRef=useRef(null);
      const chartRef=useRef(null);
      const[strat,setStrat]=useState('bull_call_spread');

      useEffect(()=>{
        if(!canvasRef.current)return;
        if(chartRef.current)chartRef.current.destroy();

        const step=spot>5000?100:spot>500?10:spot>50?2:1;
        const lo=Math.max(step,Math.round(spot*0.6/step)*step);
        const hi=Math.round(spot*1.4/step)*step;
        const prices=[];
        for(let s=lo;s<=hi;s+=step) prices.push(s);

        const K=strike;
        const K2=Math.round(K*1.1/step)*step; // upper strike
        const K3=Math.round(K*0.9/step)*step; // lower strike

        let pnlData=[],label='',color='#00ff88';
        const bsC1=bsPrice(spot,K,rate,vol,maturity,'call');
        const bsP1=bsPrice(spot,K,rate,vol,maturity,'put');
        const bsC2=bsPrice(spot,K2,rate,vol,maturity,'call');
        const bsP2=bsPrice(spot,K3,rate,vol,maturity,'put');

        if(strat==='bull_call_spread'){
          label='Bull Call Spread';color='#00ff88';
          pnlData=prices.map(s=>Math.max(s-K,0)-Math.max(s-K2,0)-(bsC1-bsC2));
        }else if(strat==='bear_put_spread'){
          label='Bear Put Spread';color='#f97316';
          pnlData=prices.map(s=>Math.max(K-s,0)-Math.max(K3-s,0)-(bsP1-bsP2));
        }else if(strat==='straddle'){
          label='Long Straddle';color='#a855f7';
          pnlData=prices.map(s=>Math.max(s-K,0)+Math.max(K-s,0)-(bsC1+bsP1));
        }else if(strat==='strangle'){
          label='Long Strangle';color='#00d4ff';
          const bsCH=bsPrice(spot,K2,rate,vol,maturity,'call');
          const bsPL=bsPrice(spot,K3,rate,vol,maturity,'put');
          pnlData=prices.map(s=>Math.max(s-K2,0)+Math.max(K3-s,0)-(bsCH+bsPL));
        }else if(strat==='iron_condor'){
          label='Iron Condor';color='#ec4899';
          const KL1=K3,KL2=Math.round(K*0.8/step)*step;
          const KH1=K2,KH2=Math.round(K*1.2/step)*step;
          const credit=bsPrice(spot,KL1,rate,vol,maturity,'put')-bsPrice(spot,KL2,rate,vol,maturity,'put')
            +bsPrice(spot,KH1,rate,vol,maturity,'call')-bsPrice(spot,KH2,rate,vol,maturity,'call');
          pnlData=prices.map(s=>{
            const putSpread=Math.max(KL1-s,0)-Math.max(KL2-s,0);
            const callSpread=Math.max(s-KH1,0)-Math.max(s-KH2,0);
            return credit-putSpread-callSpread;
          });
        }else if(strat==='butterfly'){
          label='Butterfly Spread';color='#fbbf24';
          const bsCM=bsPrice(spot,K,rate,vol,maturity,'call');
          const bsCL=bsPrice(spot,K3,rate,vol,maturity,'call');
          const bsCH=bsPrice(spot,K2,rate,vol,maturity,'call');
          const cost=bsCL-2*bsCM+bsCH;
          pnlData=prices.map(s=>Math.max(s-K3,0)-2*Math.max(s-K,0)+Math.max(s-K2,0)-cost);
        }

        const zeroLine=prices.map(()=>0);

        chartRef.current=new Chart(canvasRef.current,{
          type:'line',
          data:{
            labels:prices.map(p=>p.toString()),
            datasets:[
              {label:label,data:pnlData,borderColor:color,borderWidth:2.5,pointRadius:0,tension:0.15,
                fill:{target:'origin',above:color+'18',below:'rgba(249,115,22,0.1)'}},
              {label:'',data:zeroLine,borderColor:'rgba(255,255,255,0.15)',borderWidth:1,borderDash:[3,4],pointRadius:0,fill:false},
            ]
          },
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{labels:{filter:i=>i.text!=='',color:'rgba(226,232,240,0.6)',font:{family:'JetBrains Mono',size:9},boxWidth:12}},
              tooltip:{backgroundColor:'rgba(3,7,18,0.92)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:10},
                callbacks:{title:c=>'S_T = '+cur+c[0].label,label:c=>c.dataset.label?c.dataset.label+': '+cur+c.raw.toFixed(2):''}},
            },
            scales:{
              x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8,callback:(v,i)=>cur+prices[i]}},
              y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},callback:v=>cur+v.toFixed(1)}},
            }
          }
        });
      },[spot,strike,rate,vol,maturity,strat]);

      const descriptions={
        bull_call_spread:'Buy lower strike call, sell higher strike call — limited risk bullish bet',
        bear_put_spread:'Buy higher strike put, sell lower strike put — limited risk bearish bet',
        straddle:'Buy call + put at same strike — profit from large moves in either direction',
        strangle:'Buy OTM call + OTM put — cheaper than straddle, needs bigger move',
        iron_condor:'Sell near-ATM strangle + buy OTM wings — profit from low volatility',
        butterfly:'Buy ITM + OTM calls, sell 2x ATM calls — profit from staying near strike',
      };

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Strategy P&L Builder</span><div className="sdot live"/></div>
          <div style={{display:'flex',gap:'0.3rem',flexWrap:'wrap',margin:'0.4rem 0'}}>
            {[['bull_call_spread','BULL CALL'],['bear_put_spread','BEAR PUT'],['straddle','STRADDLE'],['strangle','STRANGLE'],['iron_condor','IRON CONDOR'],['butterfly','BUTTERFLY']].map(([k,l])=>(
              <button key={k} className={'method-btn'+(strat===k?' active':'')} style={{fontSize:'0.48rem',padding:'0.2rem 0.45rem'}} onClick={()=>setStrat(k)}>{l}</button>
            ))}
          </div>
          <div style={{height:'200px',position:'relative'}}>
            <canvas ref={canvasRef}/>
          </div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',marginTop:'0.3rem'}}>
            {descriptions[strat]}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       VARIANCE REDUCTION COMPARISON
    ═══════════════════════════════════════════════════ */
    function VarReductionPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[vrData,setVrData]=useState(null);
      const[vrBusy,setVrBusy]=useState(false);

      const runComparison=()=>{
        setVrBusy(true);
        setTimeout(()=>{
          const N=50000;
          const bsVal=bsPrice(spot,strike,rate,vol,maturity,'call');
          const methods=[
            {name:'Standard MC',fn:mcPrice,color:'#e2e8f0'},
            {name:'Antithetic',fn:mcPriceAntithetic,color:'#00ff88'},
            {name:'Control Variate',fn:mcPriceControlVariate,color:'#00d4ff'},
          ];
          const results=methods.map(m=>{
            const r=m.fn(spot,strike,rate,vol,maturity,N,'call');
            return{...m,price:r.price,se:r.se,error:Math.abs(r.price-bsVal),reduction:0};
          });
          const baseSE=results[0].se;
          results.forEach(r=>{r.reduction=baseSE>0?(1-r.se/baseSE)*100:0;});
          results.sort((a,b)=>a.se-b.se);
          setVrData({results,bsVal,N});
          setVrBusy(false);
          gsap.fromTo('.vr-result',{y:12,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Variance Reduction Comparison</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.3rem 0 0.5rem'}}>
            Compare all MC methods head-to-head: Standard vs Antithetic vs Control Variate (50K sims)
          </div>
          <button className="run-btn" style={{fontSize:'0.55rem',padding:'0.4rem 1rem'}} onClick={runComparison} disabled={vrBusy}>
            {vrBusy?'RUNNING...':'RUN COMPARISON'}
          </button>
          {vrData&&(
            <div className="vr-result" style={{marginTop:'0.6rem'}}>
              <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--accent)',marginBottom:'0.4rem'}}>
                BS BENCHMARK: {cur}{vrData.bsVal.toFixed(4)} · {vrData.N.toLocaleString()} simulations
              </div>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.5rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{textAlign:'left',padding:'0.3rem',color:'var(--muted)'}}>RANK</th>
                    <th style={{textAlign:'left',padding:'0.3rem',color:'var(--muted)'}}>METHOD</th>
                    <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>PRICE</th>
                    <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>SE</th>
                    <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>|ERROR|</th>
                    <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>REDUCTION</th>
                  </tr>
                </thead>
                <tbody>
                  {vrData.results.map((r,i)=>(
                    <tr key={r.name} style={{borderBottom:'1px solid rgba(255,255,255,0.03)',background:i===0?'rgba(0,255,136,0.04)':'transparent'}}>
                      <td style={{padding:'0.3rem',color:i===0?'#00ff88':'var(--text)'}}>{i===0?'BEST':'#'+(i+1)}</td>
                      <td style={{padding:'0.3rem',color:r.color,fontWeight:i===0?600:400}}>{r.name}</td>
                      <td style={{padding:'0.3rem',textAlign:'right'}}>{cur}{r.price.toFixed(4)}</td>
                      <td style={{padding:'0.3rem',textAlign:'right',color:i===0?'#00ff88':'var(--text)'}}>{r.se.toFixed(5)}</td>
                      <td style={{padding:'0.3rem',textAlign:'right'}}>{cur}{r.error.toFixed(4)}</td>
                      <td style={{padding:'0.3rem',textAlign:'right',color:r.reduction>0?'#00ff88':'var(--muted)'}}>{r.reduction>0?'+':''}{r.reduction.toFixed(1)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       STRESS TEST PANEL
    ═══════════════════════════════════════════════════ */
    function StressTestPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const currentPrice=bsPrice(spot,strike,rate,vol,maturity,'call');

      const scenarios=[
        {name:'Black Monday (1987)',spotShock:-0.225,volShock:0.30,emoji:'💥'},
        {name:'GFC (2008)',spotShock:-0.15,volShock:0.25,emoji:'🏦'},
        {name:'COVID Crash (2020)',spotShock:-0.12,volShock:0.35,emoji:'🦠'},
        {name:'Flash Crash (2010)',spotShock:-0.09,volShock:0.20,emoji:'⚡'},
        {name:'Dot-Com (2000)',spotShock:-0.10,volShock:0.15,emoji:'💻'},
        {name:'Bull Rally (+10%)',spotShock:0.10,volShock:-0.05,emoji:'📈'},
        {name:'Melt-Up (+20%)',spotShock:0.20,volShock:-0.08,emoji:'🚀'},
        {name:'Vol Spike (flat)',spotShock:0.0,volShock:0.20,emoji:'🌊'},
        {name:'Vol Crush (flat)',spotShock:0.0,volShock:-0.10,emoji:'🔇'},
      ];

      const results=scenarios.map(sc=>{
        const newSpot=spot*(1+sc.spotShock);
        const newVol=Math.max(0.01,vol+sc.volShock);
        const newPrice=bsPrice(newSpot,strike,rate,newVol,maturity,'call');
        const pnl=newPrice-currentPrice;
        const pnlPct=currentPrice>0?(pnl/currentPrice)*100:0;
        return{...sc,newPrice,pnl,pnlPct};
      });

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Stress Test Scenarios</span><div className="sdot live"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.3rem 0 0.5rem'}}>
            How your ATM call ({cur}{currentPrice.toFixed(2)}) performs under historical-style shocks
          </div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.48rem'}}>
              <thead>
                <tr style={{borderBottom:'1px solid var(--border)'}}>
                  <th style={{textAlign:'left',padding:'0.3rem',color:'var(--muted)'}}>SCENARIO</th>
                  <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>SPOT</th>
                  <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>VOL</th>
                  <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>NEW PRICE</th>
                  <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>P&L</th>
                  <th style={{textAlign:'right',padding:'0.3rem',color:'var(--muted)'}}>P&L %</th>
                </tr>
              </thead>
              <tbody>
                {results.map(r=>(
                  <tr key={r.name} style={{borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
                    <td style={{padding:'0.3rem',color:'var(--text)'}}>{r.emoji} {r.name}</td>
                    <td style={{padding:'0.3rem',textAlign:'right',color:r.spotShock<0?'#f97316':r.spotShock>0?'#00ff88':'var(--muted)'}}>
                      {r.spotShock>0?'+':''}{(r.spotShock*100).toFixed(1)}%
                    </td>
                    <td style={{padding:'0.3rem',textAlign:'right',color:r.volShock>0?'#ec4899':r.volShock<0?'#00d4ff':'var(--muted)'}}>
                      {r.volShock>0?'+':''}{(r.volShock*100).toFixed(0)}%
                    </td>
                    <td style={{padding:'0.3rem',textAlign:'right'}}>{cur}{r.newPrice.toFixed(2)}</td>
                    <td style={{padding:'0.3rem',textAlign:'right',color:r.pnl>=0?'#00ff88':'#f97316',fontWeight:600}}>
                      {r.pnl>=0?'+':''}{cur}{r.pnl.toFixed(2)}
                    </td>
                    <td style={{padding:'0.3rem',textAlign:'right',color:r.pnlPct>=0?'#00ff88':'#f97316'}}>
                      {r.pnlPct>=0?'+':''}{r.pnlPct.toFixed(1)}%
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       P&L SCENARIO MATRIX
    ═══════════════════════════════════════════════════ */
    /* ═══════════════════════════════════════════════════
       CROSS-REGION HEATMAP MATRIX
    ═══════════════════════════════════════════════════ */
    function RegionHeatmapMatrix({params,currency}){
      const{spot,strike,maturity}=params;
      const cur=currency;
      const[metric,setMetric]=useState('call');

      const regionList=Object.values(REGIONS);
      const volShifts=[-10,-5,0,5,10];

      const grid=regionList.map(r=>{
        return volShifts.map(dv=>{
          const v=Math.max(0.01,r.vol+dv/100);
          const g=bsGreeks(spot,strike,r.rate,v,maturity);
          if(metric==='call') return bsPrice(spot,strike,r.rate,v,maturity,'call');
          if(metric==='put')  return bsPrice(spot,strike,r.rate,v,maturity,'put');
          if(metric==='delta')return g.callDelta;
          if(metric==='vega') return g.vega;
          if(metric==='theta')return g.callTheta;
          if(metric==='gamma')return g.gamma;
          return 0;
        });
      });

      const flat=grid.flat();
      const mn=Math.min(...flat),mx=Math.max(...flat),span=mx-mn||1;

      const cellColor=(v)=>{
        const t=(v-mn)/span;
        const c1=[3,7,18],c2=[0,255,136];
        const r=Math.round(c1[0]+(c2[0]-c1[0])*t);
        const g=Math.round(c1[1]+(c2[1]-c1[1])*t);
        const b=Math.round(c1[2]+(c2[2]-c1[2])*t);
        return `rgba(${r},${g},${b},${0.25+t*0.55})`;
      };

      const fmtVal=(v)=>{
        if(metric==='call'||metric==='put') return cur+v.toFixed(2);
        if(metric==='delta'||metric==='gamma') return v.toFixed(3);
        return v.toFixed(2);
      };

      const metricLabel={call:'CALL PRICE',put:'PUT PRICE',delta:'DELTA',vega:'VEGA',theta:'THETA (Call)',gamma:'GAMMA'}[metric];

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem',overflowX:'auto'}}>
          <div className="card-head"><span className="card-tag">Cross-Region Heatmap Matrix</span><div className="sdot live"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',margin:'0.3rem 0 0.5rem'}}>
            {metricLabel} across all 4 regions (rows) × volatility shift (cols). Strike={cur}{strike}, T={maturity.toFixed(2)}y. Each region applies its own risk-free rate and baseline vol.
          </div>
          <div style={{display:'flex',gap:'0.35rem',marginBottom:'0.55rem',flexWrap:'wrap'}}>
            {['call','put','delta','vega','theta','gamma'].map(m=>(
              <button key={m} className={`method-btn${metric===m?' active':''}`}
                style={{fontSize:'0.48rem',padding:'0.2rem 0.55rem'}} onClick={()=>setMetric(m)}>
                {m.toUpperCase()}
              </button>
            ))}
          </div>
          <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'JetBrains Mono',fontSize:'0.46rem'}}>
            <thead>
              <tr>
                <th style={{padding:'0.3rem',color:'var(--muted)',textAlign:'left',borderBottom:'1px solid var(--border)'}}>Region ↓ / Vol Shift →</th>
                {volShifts.map(dv=>(
                  <th key={dv} style={{padding:'0.3rem',textAlign:'center',borderBottom:'1px solid var(--border)',
                    color:dv===0?'var(--accent)':'var(--muted)'}}>{dv>0?'+':''}{dv}%</th>
                ))}
                <th style={{padding:'0.3rem',textAlign:'right',borderBottom:'1px solid var(--border)',color:'var(--muted)'}}>Rate</th>
                <th style={{padding:'0.3rem',textAlign:'right',borderBottom:'1px solid var(--border)',color:'var(--muted)'}}>Base Vol</th>
              </tr>
            </thead>
            <tbody>
              {grid.map((row,i)=>{
                const r=regionList[i];
                return(
                  <tr key={r.id}>
                    <td style={{padding:'0.3rem',color:r.color,fontWeight:600,borderRight:'1px solid var(--border)',whiteSpace:'nowrap'}}>
                      {r.flag} {r.name}
                    </td>
                    {row.map((v,j)=>(
                      <td key={j} style={{padding:'0.28rem 0.35rem',textAlign:'center',
                        background:cellColor(v),color:'#e2e8f0',
                        border:'1px solid rgba(255,255,255,0.03)',
                        fontWeight:volShifts[j]===0?700:400}}>
                        {fmtVal(v)}
                      </td>
                    ))}
                    <td style={{padding:'0.3rem',textAlign:'right',color:'var(--muted)',borderLeft:'1px solid var(--border)'}}>
                      {(r.rate*100).toFixed(2)}%
                    </td>
                    <td style={{padding:'0.3rem',textAlign:'right',color:'var(--muted)'}}>
                      {(r.vol*100).toFixed(0)}%
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:'0.5rem',fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>
            <span>LOW: {fmtVal(mn)}</span>
            <span>HIGH: {fmtVal(mx)}</span>
            <span>SPREAD: {fmtVal(mx-mn)}</span>
          </div>
        </div>
      );
    }

    function PnlMatrix({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const currentPrice=bsPrice(spot,strike,rate,vol,maturity,'call');
      const spotShifts=[-20,-15,-10,-5,0,5,10,15,20];
      const volShifts=[-10,-5,0,5,10];

      const grid=spotShifts.map(ds=>{
        return volShifts.map(dv=>{
          const newSpot=spot*(1+ds/100);
          const newVol=Math.max(0.01,vol+dv/100);
          const newPrice=bsPrice(newSpot,strike,rate,newVol,maturity,'call');
          return newPrice-currentPrice;
        });
      });

      const flat=grid.flat();
      const maxPnl=Math.max(...flat.map(Math.abs));

      const pnlColor=(v)=>{
        if(maxPnl===0)return'var(--muted)';
        const intensity=Math.min(1,Math.abs(v)/maxPnl);
        if(v>=0) return `rgba(0,255,136,${0.15+intensity*0.6})`;
        return `rgba(249,115,22,${0.15+intensity*0.6})`;
      };

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem',overflowX:'auto'}}>
          <div className="card-head"><span className="card-tag">P&L Scenario Matrix</span><div className="sdot live"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',margin:'0.3rem 0 0.4rem'}}>
            Call P&L under combined spot and vol shifts (current: {cur}{currentPrice.toFixed(2)})
          </div>
          <table style={{borderCollapse:'collapse',width:'100%',fontFamily:'JetBrains Mono',fontSize:'0.45rem'}}>
            <thead>
              <tr>
                <th style={{padding:'0.25rem',color:'var(--muted)',textAlign:'left',borderBottom:'1px solid var(--border)'}}>Spot↓ Vol→</th>
                {volShifts.map(dv=>(
                  <th key={dv} style={{padding:'0.25rem',textAlign:'center',borderBottom:'1px solid var(--border)',
                    color:dv===0?'var(--accent)':'var(--muted)'}}>{dv>0?'+':''}{dv}%</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {grid.map((row,i)=>(
                <tr key={i}>
                  <td style={{padding:'0.25rem',fontWeight:spotShifts[i]===0?600:400,
                    color:spotShifts[i]===0?'var(--accent)':'var(--text)',borderRight:'1px solid var(--border)'}}>
                    {spotShifts[i]>0?'+':''}{spotShifts[i]}%
                  </td>
                  {row.map((v,j)=>(
                    <td key={j} style={{padding:'0.2rem 0.3rem',textAlign:'center',
                      background:pnlColor(v),color:v>=0?'#00ff88':'#f97316',
                      border:'1px solid rgba(255,255,255,0.02)',fontWeight:spotShifts[i]===0&&volShifts[j]===0?700:400}}>
                      {v>=0?'+':''}{v.toFixed(1)}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       TIME DECAY CHART
    ═══════════════════════════════════════════════════ */
    function TimeDecayChart({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const canvasRef=useRef(null);
      const chartRef=useRef(null);

      useEffect(()=>{
        if(!canvasRef.current)return;
        if(chartRef.current)chartRef.current.destroy();

        const n=50;
        const times=[],callPrices=[],putPrices=[],thetaVals=[];
        for(let i=0;i<n;i++){
          const t=maturity*(1-i/(n-1));
          const T=Math.max(0.001,t);
          times.push(Math.round(T*252));
          callPrices.push(bsPrice(spot,strike,rate,vol,T,'call'));
          putPrices.push(bsPrice(spot,strike,rate,vol,T,'put'));
          const g=bsGreeks(spot,strike,rate,vol,T);
          thetaVals.push(g?g.callTheta:0);
        }

        chartRef.current=new Chart(canvasRef.current,{
          type:'line',
          data:{
            labels:times,
            datasets:[
              {label:'Call Value',data:callPrices,borderColor:'#00ff88',borderWidth:2,pointRadius:0,tension:0.3,fill:{target:'origin',above:'rgba(0,255,136,0.08)'},yAxisID:'y'},
              {label:'Put Value',data:putPrices,borderColor:'#f97316',borderWidth:2,pointRadius:0,tension:0.3,fill:false,yAxisID:'y'},
              {label:'Theta/day',data:thetaVals,borderColor:'#ec4899',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.3,fill:false,yAxisID:'y1'},
            ]
          },
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{labels:{color:'rgba(226,232,240,0.6)',font:{family:'JetBrains Mono',size:9},boxWidth:12}},
              tooltip:{backgroundColor:'rgba(3,7,18,0.92)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:10},
                callbacks:{title:c=>c[0].label+' days to expiry',label:c=>c.dataset.label+': '+cur+c.raw.toFixed(3)}},
            },
            scales:{
              x:{reverse:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8,callback:v=>v+'d'},title:{display:true,text:'Days to Expiry',color:'rgba(226,232,240,0.3)',font:{family:'JetBrains Mono',size:9}}},
              y:{position:'left',grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},callback:v=>cur+v.toFixed(1)},title:{display:true,text:'Option Value',color:'rgba(226,232,240,0.3)',font:{family:'JetBrains Mono',size:9}}},
              y1:{position:'right',grid:{display:false},ticks:{color:'rgba(236,72,153,0.5)',font:{family:'JetBrains Mono',size:9},callback:v=>v.toFixed(3)},title:{display:true,text:'Theta',color:'rgba(236,72,153,0.5)',font:{family:'JetBrains Mono',size:9}}},
            }
          }
        });
      },[spot,strike,rate,vol,maturity]);

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Time Decay Projection</span><div className="sdot live"/></div>
          <div style={{height:'220px',position:'relative',marginTop:'0.4rem'}}>
            <canvas ref={canvasRef}/>
          </div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',marginTop:'0.3rem'}}>
            Option value erodes as expiry approaches — theta decay accelerates near expiration (especially ATM)
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       IMPLIED VOL SMILE CHART
    ═══════════════════════════════════════════════════ */
    function IVSmileChart({params,currency}){
      const{spot,rate,vol,maturity}=params;
      const cur=currency;
      const canvasRef=useRef(null);
      const chartRef=useRef(null);

      useEffect(()=>{
        if(!canvasRef.current)return;
        if(chartRef.current)chartRef.current.destroy();

        // Generate synthetic vol smile with skew and curvature
        const step=spot>5000?500:spot>500?50:spot>50?10:5;
        const strikes=[];
        for(let k=Math.round(spot*0.7/step)*step;k<=spot*1.3;k+=step) strikes.push(k);

        const skew=-0.15,smile=0.05;
        const maturities=[0.083,0.25,0.5,1.0];
        const matLabels=['1M','3M','6M','1Y'];
        const colors=['#ec4899','#f97316','#00d4ff','#00ff88'];

        const datasets=maturities.map((T,idx)=>{
          const vols=strikes.map(K=>{
            const m=K/spot-1;
            const termAdj=-0.03*(Math.sqrt(T)-Math.sqrt(0.25));
            return Math.max(0.02,vol+skew*m+smile*m*m+termAdj);
          });
          return{
            label:matLabels[idx],
            data:vols.map(v=>v*100),
            borderColor:colors[idx],
            borderWidth:2,
            pointRadius:0,
            tension:0.4,
            fill:false,
          };
        });

        chartRef.current=new Chart(canvasRef.current,{
          type:'line',
          data:{labels:strikes.map(k=>k.toString()),datasets},
          options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{
              legend:{labels:{color:'rgba(226,232,240,0.6)',font:{family:'JetBrains Mono',size:9},boxWidth:12}},
              tooltip:{backgroundColor:'rgba(3,7,18,0.92)',titleColor:'#e2e8f0',bodyColor:'#e2e8f0',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:'JetBrains Mono',size:10},bodyFont:{family:'JetBrains Mono',size:10},
                callbacks:{title:c=>'K = '+cur+c[0].label,label:c=>c.dataset.label+': '+c.raw.toFixed(1)+'%'}},
            },
            scales:{
              x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},maxTicksLimit:8,callback:(v,i)=>cur+strikes[i]},title:{display:true,text:'Strike',color:'rgba(226,232,240,0.3)',font:{family:'JetBrains Mono',size:9}}},
              y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(226,232,240,0.35)',font:{family:'JetBrains Mono',size:9},callback:v=>v.toFixed(0)+'%'},title:{display:true,text:'Implied Vol',color:'rgba(226,232,240,0.3)',font:{family:'JetBrains Mono',size:9}}},
            }
          }
        });
      },[spot,rate,vol,maturity]);

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Volatility Smile</span><div className="sdot live"/></div>
          <div style={{height:'200px',position:'relative',marginTop:'0.4rem'}}>
            <canvas ref={canvasRef}/>
          </div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.45rem',color:'var(--muted)',marginTop:'0.3rem'}}>
            Synthetic vol smile across strikes and maturities — OTM puts (left) trade at higher IV due to crash protection demand
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       PORTFOLIO RISK PANEL
    ═══════════════════════════════════════════════════ */
    function PortfolioPanel({region,currency}){
      const cur=currency;
      const stocks=STOCKS[region.id]||[];
      const[selected,setSelected]=useState([]);
      const[portRes,setPortRes]=useState(null);

      const toggleStock=(ticker)=>{
        setSelected(prev=>{
          if(prev.find(s=>s.t===ticker)){
            return prev.filter(s=>s.t!==ticker);
          }
          const stk=stocks.find(s=>s.t===ticker);
          if(!stk||prev.length>=5)return prev;
          return[...prev,{...stk,weight:1}];
        });
      };

      const setWeight=(ticker,w)=>{
        setSelected(prev=>prev.map(s=>s.t===ticker?{...s,weight:Math.max(0.1,w)}:s));
      };

      const computePortfolio=()=>{
        if(selected.length<2)return;
        const totalW=selected.reduce((a,s)=>a+s.weight,0);
        const weights=selected.map(s=>s.weight/totalW);
        const N=20000,horizon=10,dt=horizon/252;

        // Simulate independent (uncorrelated) portfolio returns
        const pnls=[];
        for(let sim=0;sim<N;sim++){
          let portVal=0,initVal=0;
          for(let i=0;i<selected.length;i++){
            const s=selected[i];
            const z=randn();
            const sT=s.p*Math.exp((region.rate-0.5*s.v*s.v)*dt+s.v*Math.sqrt(dt)*z);
            portVal+=weights[i]*sT;
            initVal+=weights[i]*s.p;
          }
          pnls.push(portVal-initVal);
        }
        pnls.sort((a,b)=>a-b);

        const initVal=selected.reduce((a,s,i)=>a+weights[i]*s.p,0);
        const idx95=Math.floor(0.05*N);
        const idx99=Math.floor(0.01*N);
        const var95=-pnls[idx95];
        const var99=-pnls[idx99];
        const cvar95=-pnls.slice(0,idx95).reduce((a,b)=>a+b,0)/idx95;
        const meanPnl=pnls.reduce((a,b)=>a+b,0)/N;
        const stdPnl=Math.sqrt(pnls.reduce((a,v)=>a+(v-meanPnl)**2,0)/N);

        // Individual VaRs for comparison
        const indivVars=selected.map((s,i)=>{
          const z95=1.645;
          return weights[i]*s.p*z95*s.v*Math.sqrt(dt);
        });
        const sumIndiv=indivVars.reduce((a,b)=>a+b,0);
        const divBenefit=Math.max(0,(1-var95/sumIndiv)*100);

        setPortRes({
          weights,initVal,var95,var99,cvar95,meanPnl,stdPnl,
          divBenefit,sumIndiv,
          sharpe:stdPnl>0?(meanPnl/stdPnl)*Math.sqrt(252/horizon):0,
        });
      };

      return(
        <div className="glass" style={{marginTop:'1rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Portfolio Risk</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.3rem 0 0.4rem'}}>
            Select 2-5 stocks to analyze portfolio-level VaR with diversification benefit
          </div>
          <div style={{display:'flex',gap:'0.3rem',flexWrap:'wrap',marginBottom:'0.5rem'}}>
            {stocks.map(s=>(
              <button key={s.t} className={'method-btn'+(selected.find(x=>x.t===s.t)?' active':'')}
                style={{fontSize:'0.45rem',padding:'0.18rem 0.4rem'}} onClick={()=>toggleStock(s.t)}>
                {s.t}
              </button>
            ))}
          </div>
          {selected.length>0&&(
            <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap',marginBottom:'0.5rem'}}>
              {selected.map(s=>(
                <div key={s.t} style={{background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:'6px',padding:'0.25rem 0.4rem',fontFamily:'JetBrains Mono',fontSize:'0.45rem',display:'flex',alignItems:'center',gap:'0.3rem'}}>
                  <span style={{color:'var(--accent)',fontWeight:600}}>{s.t}</span>
                  <span style={{color:'var(--muted)'}}>{cur}{s.p}</span>
                  <input type="number" value={s.weight} min={0.1} max={10} step={0.1}
                    onChange={e=>setWeight(s.t,+e.target.value)}
                    style={{width:'40px',background:'rgba(255,255,255,0.06)',border:'1px solid var(--border)',color:'var(--text)',padding:'0.1rem 0.2rem',borderRadius:'4px',fontFamily:'JetBrains Mono',fontSize:'0.45rem',textAlign:'center'}}/>
                </div>
              ))}
            </div>
          )}
          {selected.length>=2&&(
            <button className="run-btn" style={{fontSize:'0.55rem',padding:'0.4rem 1rem'}} onClick={computePortfolio}>
              ANALYZE PORTFOLIO
            </button>
          )}
          {portRes&&(
            <div style={{marginTop:'0.6rem',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'0.4rem'}}>
              <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.4rem'}}>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.1em'}}>95% VaR (10D)</div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#00ff88',marginTop:'0.15rem'}}>{cur}{portRes.var95.toFixed(2)}</div>
              </div>
              <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.4rem'}}>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.1em'}}>99% VaR (10D)</div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#f97316',marginTop:'0.15rem'}}>{cur}{portRes.var99.toFixed(2)}</div>
              </div>
              <div style={{background:'rgba(0,212,255,0.06)',border:'1px solid rgba(0,212,255,0.12)',borderRadius:'6px',padding:'0.4rem'}}>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.1em'}}>CVaR (95%)</div>
                <div style={{fontFamily:'JetBrains Mono',fontSize:'0.75rem',color:'#00d4ff',marginTop:'0.15rem'}}>{cur}{portRes.cvar95.toFixed(2)}</div>
              </div>

    /* ═══════════════════════════════════════════════════
       HESTON STOCHASTIC VOL PANEL
    ═══════════════════════════════════════════════════ */
    function HestonPanel({params,currency}){
      const{spot,strike,rate,vol,maturity,n}=params;
      const cur=currency;
      const[kappa,setKappa]=useState(2.0);
      const[theta,setTheta]=useState(0.04);
      const[vov,setVov]=useState(0.3);
      const[rho,setRho]=useState(-0.7);
      const[hRes,setHRes]=useState(null);
      const[hBusy,setHBusy]=useState(false);

      // Heston MC in JS (Euler-Maruyama)
      const runHeston=()=>{
        setHBusy(true);
        setTimeout(()=>{
          const N=Math.min(n,20000),steps=150,dt=maturity/steps;
          const v0=vol*vol;
          const disc=Math.exp(-rate*maturity);

          const priceH=(ot)=>{
            let sum=0,sumSq=0,sumGbm=0;
            for(let i=0;i<N;i++){
              let S=spot,v=v0;
              for(let t=0;t<steps;t++){
                const z1=randn(),z2p=randn();
                const z2=rho*z1+Math.sqrt(1-rho*rho)*z2p;
                const vp=Math.max(v,0),sv=Math.sqrt(vp);
                S=S*Math.exp((rate-0.5*vp)*dt+sv*Math.sqrt(dt)*z1);
                v=v+kappa*(theta-vp)*dt+vov*sv*Math.sqrt(dt)*z2;
              }
              const pay=ot==='call'?Math.max(S-strike,0):Math.max(strike-S,0);
              sum+=pay;sumSq+=pay*pay;
              // GBM comparison
              const zg=randn();
              const sg=spot*Math.exp((rate-0.5*vol*vol)*maturity+vol*Math.sqrt(maturity)*zg);
              sumGbm+=ot==='call'?Math.max(sg-strike,0):Math.max(strike-sg,0);
            }
            const mu=sum/N,v2=Math.max(sumSq/N-mu*mu,0);
            const p=disc*mu,se=disc*Math.sqrt(v2/N);
            return{price:p,se,gbmPrice:disc*sumGbm/N,premium:p-disc*sumGbm/N};
          };

          const call=priceH('call'),put=priceH('put');
          const feller=2*kappa*theta/(vov*vov);

          // Smile: price at different strikes
          const moneys=[0.85,0.90,0.95,1.0,1.05,1.10,1.15];
          const smile=moneys.map(m=>{
            const K2=spot*m;
            let sm=0;
            for(let i=0;i<Math.min(N,8000);i++){
              let S2=spot,v2=v0;
              for(let t=0;t<steps;t++){
                const z1=randn(),z2p=randn();
                const z2=rho*z1+Math.sqrt(1-rho*rho)*z2p;
                const vp=Math.max(v2,0),sv=Math.sqrt(vp);
                S2=S2*Math.exp((rate-0.5*vp)*dt+sv*Math.sqrt(dt)*z1);
                v2=v2+kappa*(theta-vp)*dt+vov*sv*Math.sqrt(dt)*z2;
              }
              sm+=Math.max(S2-K2,0);
            }
            const cp=disc*sm/Math.min(N,8000);
            // Bisection IV
            let lo=0.01,hi=2.0;
            for(let it=0;it<80;it++){
              const mid=(lo+hi)/2;
              const bsp=bsPrice(spot,K2,rate,mid,maturity,'call');
              if(bsp<cp)lo=mid;else hi=mid;
            }
            return{moneyness:m,strike:K2,iv:(lo+hi)/2};
          });

          setHRes({call,put,feller,fellerOk:feller>1,smile});
          setHBusy(false);
          gsap.fromTo('.heston-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Heston Stochastic Volatility</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem',lineHeight:'1.5'}}>
            dS = r·S·dt + √v·S·dW₁ &nbsp;|&nbsp; dv = κ(θ−v)dt + σᵥ·√v·dW₂ &nbsp;|&nbsp; Corr = ρ
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'0.5rem',marginBottom:'0.6rem'}}>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.08em'}}>KAPPA (κ)</span>
              <input type="range" min="0.5" max="10" step="0.1" value={kappa} onChange={e=>setKappa(+e.target.value)} style={{accentColor:'var(--accent)'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{kappa.toFixed(1)}</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.08em'}}>THETA (θ)</span>
              <input type="range" min="0.01" max="0.20" step="0.005" value={theta} onChange={e=>setTheta(+e.target.value)} style={{accentColor:'#00d4ff'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{(Math.sqrt(theta)*100).toFixed(0)}% vol</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'0.15rem'}}>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)',letterSpacing:'0.08em'}}>VOL OF VOL (σᵥ)</span>
              <input type="range" min="0.05" max="1.5" step="0.05" value={vov} onChange={e=>setVov(+e.target.value)} style={{accentColor:'#a855f7'}}/>
              <span style={{fontFamily:'JetBrains Mono',fontSize:'0.55rem',color:'var(--text)',textAlign:'center'}}>{vov.toFixed(2)}</span>
            </div>

    /* ═══════════════════════════════════════════════════
       YIELD CURVE PANEL
    ═══════════════════════════════════════════════════ */
    function YieldCurvePanel({params,currency}){
      const{rate}=params;
      const cur=currency;
      const[curveModel,setCurveModel]=useState('nelson-siegel');
      const[ycRes,setYcRes]=useState(null);
      const chartRef=useRef(null);
      const chartInst=useRef(null);

      const runYC=()=>{
        // Nelson-Siegel computation in JS
        const ns=(T,b0,b1,b2,tau)=>{
          const x=T/tau;
          const f1=(1-Math.exp(-x))/x;
          const f2=f1-Math.exp(-x);
          return b0+b1*f1+b2*f2;
        };
        const mats=[];
        for(let t=0.1;t<=30;t+=0.6) mats.push(t);

        let rates,fwds;
        if(curveModel==='flat'){
          rates=mats.map(()=>rate);
        }else if(curveModel==='nelson-siegel'){
          rates=mats.map(t=>ns(t,rate,-0.02,0.03,1.5));
        }else if(curveModel==='inverted'){
          rates=mats.map(t=>ns(t,rate-0.01,0.03,-0.02,1.0));
        }else{
          rates=mats.map(t=>ns(t,rate+0.02,-0.04,0.05,2.0));
        }
        // Forward rates
        fwds=[rates[0]];
        for(let i=1;i<mats.length;i++){
          const dt=mats[i]-mats[i-1];
          fwds.push((rates[i]*mats[i]-rates[i-1]*mats[i-1])/dt);
        }
        const dfs=mats.map((t,i)=>Math.exp(-rates[i]*t));

        setYcRes({mats,rates,fwds,dfs});

        // Draw chart
        setTimeout(()=>{
          if(!chartRef.current)return;
          if(chartInst.current)chartInst.current.destroy();
          chartInst.current=new Chart(chartRef.current,{
            type:'line',
            data:{
              labels:mats.map(t=>t.toFixed(1)+'Y'),
              datasets:[
                {label:'Spot Rate',data:rates.map(r=>r*100),borderColor:'#00ff88',backgroundColor:'rgba(0,255,136,0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:1.5},
                {label:'Forward Rate',data:fwds.map(r=>r*100),borderColor:'#f97316',backgroundColor:'transparent',fill:false,tension:0.3,pointRadius:0,borderWidth:1,borderDash:[4,3]},
              ],
            },
            options:{
              responsive:true,maintainAspectRatio:false,
              plugins:{legend:{labels:{color:'rgba(255,255,255,0.5)',font:{family:'JetBrains Mono',size:8}}}},
              scales:{
                x:{ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7},maxTicksLimit:10},grid:{color:'rgba(255,255,255,0.04)'}},
                y:{ticks:{color:'rgba(255,255,255,0.3)',font:{family:'JetBrains Mono',size:7},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(255,255,255,0.06)'}},
              },
            },
          });
        },50);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Yield Curve / Term Structure</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.5rem',lineHeight:'1.5'}}>
            Nelson-Siegel term structure model: r(T) = β₀ + β₁·f₁(T/τ) + β₂·f₂(T/τ)
          </div>
          <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap',margin:'0 0 0.6rem'}}>
            {[['flat','FLAT'],['nelson-siegel','NELSON-SIEGEL'],['inverted','INVERTED'],['steep','STEEP']].map(([k,l])=>(
              <button key={k} className={'method-btn'+(curveModel===k?' active':'')} style={{fontSize:'0.5rem',padding:'0.25rem 0.5rem'}} onClick={()=>setCurveModel(k)}>{l}</button>
            ))}
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={runYC}>
            GENERATE CURVE
          </button>
          {ycRes&&(
            <div style={{marginTop:'0.7rem'}}>
              <div style={{height:'180px',marginBottom:'0.5rem'}}><canvas ref={chartRef}/></div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.3rem'}}>
                {[
                  ['3M RATE',ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=0.25))],'#00ff88'],
                  ['1Y RATE',ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=1.0))],'#00d4ff'],
                  ['5Y RATE',ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=5.0))],'#a855f7'],
                  ['10Y RATE',ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=10.0))],'#f97316'],
                ].map(([label,val,col])=>(
                  <div key={label} style={{background:`${col}0F`,border:`1px solid ${col}20`,borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                    <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)',letterSpacing:'0.1em'}}>{label}</div>
                    <div style={{fontFamily:'JetBrains Mono',fontSize:'0.7rem',color:col,marginTop:'0.1rem'}}>{val!=null?(val*100).toFixed(2)+'%':'—'}</div>
                  </div>
                ))}
              </div>
              <div style={{marginTop:'0.4rem',fontFamily:'JetBrains Mono',fontSize:'0.42rem',color:'var(--muted)'}}>
                Spread (10Y−3M): {ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=10.0))]!=null&&ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=0.25))]!=null?
                  ((ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=10.0))]-ycRes.rates[Math.floor(ycRes.mats.findIndex(t=>t>=0.25))])*10000).toFixed(0)+'bp':'—'}
                &nbsp;|&nbsp; Model: {curveModel}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       MULTI-MODEL COMPARISON PANEL
    ═══════════════════════════════════════════════════ */
    function ModelComparePanel({params,currency}){
      const{spot,strike,rate,vol,maturity,n}=params;
      const cur=currency;
      const[cmpRes,setCmpRes]=useState(null);
      const[cmpBusy,setCmpBusy]=useState(false);

      const runCompare=()=>{
        setCmpBusy(true);
        setTimeout(()=>{
          const N=Math.min(n,15000);
          // 1. Black-Scholes
          const bsC=bsPrice(spot,strike,rate,vol,maturity,'call');
          const bsP=bsPrice(spot,strike,rate,vol,maturity,'put');
          // 2. Standard MC
          const mcStd=mcPrice(spot,strike,rate,vol,maturity,N,'call');
          const mcStdP=mcPrice(spot,strike,rate,vol,maturity,N,'put');
          // 3. Antithetic MC
          const mcAnt=mcPriceAntithetic(spot,strike,rate,vol,maturity,N,'call');
          const mcAntP=mcPriceAntithetic(spot,strike,rate,vol,maturity,N,'put');
          // 4. Control Variate MC
          const mcCV=mcPriceControlVariate(spot,strike,rate,vol,maturity,N,'call');
          const mcCVP=mcPriceControlVariate(spot,strike,rate,vol,maturity,N,'put');
          // 5. Jump-Diffusion
          const jd=mcJumpDiffusion(spot,strike,rate,vol,maturity,N,'call',1.0,-0.05,0.10);
          const jdP=mcJumpDiffusion(spot,strike,rate,vol,maturity,N,'put',1.0,-0.05,0.10);
          // 6. Heston (quick)
          const hestonPrice=(ot)=>{
            const steps=80,dt2=maturity/steps,v0=vol*vol,disc=Math.exp(-rate*maturity);
            let sm=0,sq=0;
            for(let i=0;i<N;i++){
              let S2=spot,v2=v0;
              for(let t=0;t<steps;t++){
                const z1=randn(),z2p=randn(),z2=-0.7*z1+Math.sqrt(1-0.49)*z2p;
                const vp=Math.max(v2,0),sv=Math.sqrt(vp);
                S2=S2*Math.exp((rate-0.5*vp)*dt2+sv*Math.sqrt(dt2)*z1);
                v2=v2+2*(0.04-vp)*dt2+0.3*sv*Math.sqrt(dt2)*z2;
              }
              const pay=ot==='call'?Math.max(S2-strike,0):Math.max(strike-S2,0);
              sm+=pay;sq+=pay*pay;
            }
            const mu=sm/N,v2m=Math.max(sq/N-mu*mu,0);
            return{price:disc*mu,se:disc*Math.sqrt(v2m/N)};
          };
          const hC=hestonPrice('call'),hP=hestonPrice('put');

          const models=[
            {name:'Black-Scholes',call:bsC,put:bsP,se:0,type:'analytical'},
            {name:'MC Standard',call:mcStd.price,put:mcStdP.price,se:mcStd.se,type:'mc'},
            {name:'MC Antithetic',call:mcAnt.price,put:mcAntP.price,se:mcAnt.se,type:'mc'},
            {name:'MC Control Var',call:mcCV.price,put:mcCVP.price,se:mcCV.se,type:'mc'},
            {name:'Jump-Diffusion',call:jd.price,put:jdP.price,se:jd.se,type:'stoch'},
            {name:'Heston SV',call:hC.price,put:hP.price,se:hC.se,type:'stoch'},
          ];

          setCmpRes(models);
          setCmpBusy(false);
          gsap.fromTo('.cmp-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
        },30);
      };

      return(
        <div className="glass" style={{marginTop:'1.5rem',padding:'1rem 1.2rem'}}>
          <div className="card-head"><span className="card-tag">Multi-Model Comparison</span><div className="sdot"/></div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:'0.48rem',color:'var(--muted)',margin:'0.4rem 0 0.6rem'}}>
            Compare 6 pricing models side-by-side: BS analytical, 3 MC methods, Merton Jump-Diffusion, Heston SV.
          </div>
          <button className="run-btn" style={{fontSize:'0.6rem',padding:'0.5rem 1.2rem'}} onClick={runCompare} disabled={cmpBusy}>
            {cmpBusy?'COMPUTING ALL MODELS...':'COMPARE ALL MODELS'}
          </button>
          {cmpRes&&(
            <div className="cmp-result" style={{marginTop:'0.7rem'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'JetBrains Mono',fontSize:'0.48rem'}}>
                <thead>
                  <tr style={{borderBottom:'1px solid var(--border)'}}>
                    <th style={{padding:'0.3rem',textAlign:'left',color:'var(--muted)'}}>Model</th>
                    <th style={{padding:'0.3rem',textAlign:'right',color:'#00ff88'}}>Call</th>
                    <th style={{padding:'0.3rem',textAlign:'right',color:'#f97316'}}>Put</th>
                    <th style={{padding:'0.3rem',textAlign:'right',color:'var(--muted)'}}>SE</th>
                    <th style={{padding:'0.3rem',textAlign:'right',color:'var(--muted)'}}>vs BS</th>
                  </tr>
                </thead>
                <tbody>
                  {cmpRes.map((m,i)=>{
                    const bsDiff=i===0?0:Math.abs(m.call-cmpRes[0].call);
                    return(
                      <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.04)',background:i===0?'rgba(0,255,136,0.04)':'transparent'}}>
                        <td style={{padding:'0.25rem',color:m.type==='analytical'?'var(--accent)':m.type==='stoch'?'#a855f7':'var(--text)',fontWeight:i===0?600:400}}>{m.name}</td>
                        <td style={{padding:'0.25rem',textAlign:'right',color:'#00ff88'}}>{cur}{m.call.toFixed(4)}</td>
                        <td style={{padding:'0.25rem',textAlign:'right',color:'#f97316'}}>{cur}{m.put.toFixed(4)}</td>
                        <td style={{padding:'0.25rem',textAlign:'right',color:'var(--muted)'}}>{m.se>0?m.se.toFixed(5):'exact'}</td>
                        <td style={{padding:'0.25rem',textAlign:'right',color:bsDiff<0.5?'#00ff88':bsDiff<2?'#f97316':'#ef4444'}}>{i===0?'—':cur+bsDiff.toFixed(4)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{marginTop:'0.4rem',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'0.3rem'}}>
                <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>BEST MC (LOWEST SE)</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.6rem',color:'#00ff88',marginTop:'0.1rem'}}>
                    {cmpRes.filter(m=>m.se>0).sort((a,b)=>a.se-b.se)[0]?.name||'—'}
                  </div>
                </div>
                <div style={{background:'rgba(168,85,247,0.06)',border:'1px solid rgba(168,85,247,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>STOCH VOL PREMIUM</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.6rem',color:'#a855f7',marginTop:'0.1rem'}}>
                    {cur}{Math.abs(cmpRes[5].call-cmpRes[0].call).toFixed(3)}
                  </div>
                </div>
                <div style={{background:'rgba(249,115,22,0.06)',border:'1px solid rgba(249,115,22,0.12)',borderRadius:'6px',padding:'0.35rem',textAlign:'center'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.4rem',color:'var(--muted)'}}>JUMP PREMIUM</div>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'0.6rem',color:'#f97316',marginTop:'0.1rem'}}>
                    {cur}{Math.abs(cmpRes[4].call-cmpRes[0].call).toFixed(3)}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════════════════════════════════
       POSITION P&L SIMULATOR
    ═══════════════════════════════════════════════════ */
    function PositionSimPanel({params,currency}){
      const{spot,strike,rate,vol,maturity}=params;
      const cur=currency;
      const[legs,setLegs]=useState([
        {type:'call',side:'long',strike:strike,qty:1},
      ]);
      const[simRes,setSimRes]=useState(null);

      const addLeg=()=>{
        if(legs.length>=6)return;
        setLegs([...legs,{type:'put',side:'long',strike:Math.round(spot*0.95),qty:1}]);
      };
      const removeLeg=(i)=>setLegs(legs.filter((_,j)=>j!==i));
      const updateLeg=(i,field,val)=>{
        const nl=[...legs];
        nl[i]={...nl[i],[field]:val};
        setLegs(nl);
      };

      const simulate=()=>{
        // Compute premium for each leg
        const legsWithPrem=legs.map(l=>{
          const prem=bsPrice(spot,l.strike,rate,vol,maturity,l.type);
          const sign=l.side==='long'?1:-1;
          return{...l,premium:prem,sign};
        });

        // Total premium paid/received
        const netPremium=legsWithPrem.reduce((s,l)=>s+l.sign*l.premium*l.qty,0);

        // P&L across spot range
        const spots=[];
        for(let s=spot*0.7;s<=spot*1.3;s+=spot*0.01) spots.push(s);

        const pnls=spots.map(s=>{
          let pnl=0;
          for(const l of legsWithPrem){
            const intrinsic=l.type==='call'?Math.max(s-l.strike,0):Math.max(l.strike-s,0);
            pnl+=l.sign*(intrinsic-l.premium)*l.qty;
          }
          return pnl;
        });

        // Key metrics
        const maxProfit=Math.max(...pnls);
        const maxLoss=Math.min(...pnls);
        const breakevens=[];
        for(let i=1;i<pnls.length;i++){
          if((pnls[i-1]<0&&pnls[i]>=0)||(pnls[i-1]>=0&&pnls[i]<0)){
            breakevens.push(spots[i]);
          }
        }

        // Strategy name detection
        let strategyName='Custom';
        if(legs.length===1&&legs[0].side==='long'&&legs[0].type==='call') strategyName='Long Call';
        else if(legs.length===1&&legs[0].side==='long'&&legs[0].type==='put') strategyName='Long Put';
        else if(legs.length===1&&legs[0].side==='short'&&legs[0].type==='call') strategyName='Short Call (Naked)';
        else if(legs.length===2){
          const sorted=[...legs].sort((a,b)=>a.strike-b.strike);
          if(sorted[0].type==='call'&&sorted[1].type==='call'&&sorted[0].side==='long'&&sorted[1].side==='short') strategyName='Bull Call Spread';
          else if(sorted[0].type==='put'&&sorted[1].type==='put'&&sorted[0].side==='short'&&sorted[1].side==='long') strategyName='Bull Put Spread';

        setSimRes({legsWithPrem,netPremium,spots,pnls,maxProfit,maxLoss,breakevens,strategyName});
        gsap.fromTo('.pos-result',{y:15,opacity:0},{y:0,opacity:1,duration:0.5,ease:'back.out(1.4)'});
